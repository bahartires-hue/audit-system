# Blueprint مجاني مبسّط لـ Render.com — Web service فقط.
# مهيأ للخطة Free بدون disk أو خدمات إضافية مدفوعة.
services:
  - type: web
    name: auditflow
    runtime: python
    rootDir: auditflow/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: AUDITFLOW_COOKIE_SECURE
        value: "1"
