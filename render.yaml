services:
  - type: web
    name: auditflow
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn auditflow_single:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AUDITFLOW_DB
        value: /var/data/auditflow.db
    disk:
      name: auditflow-data
      mountPath: /var/data
      sizeGB: 1
