<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام تجارة الجنوط | OptimalMatch</title>
    <link rel="stylesheet" href="/static/tailwind.css?v=9" />
    <link rel="stylesheet" href="/static/dark.css?v=9" />
  </head>
  <body class="erp-shell bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="toast" class="hidden toast-host text-white px-4 py-3 rounded-xl font-extrabold text-sm"></div>
    <div class="erp-content min-h-0">
      <header class="erp-topbar">
        <div class="min-w-0 flex flex-col">
          <span class="erp-topbar__title truncate">نظام تجارة الجنوط المستخدمة</span>
          <span class="text-xs opacity-70">MVP: أصناف + مشتريات + مبيعات + مخزون + تقارير</span>
        </div>
        <div class="flex items-center gap-2 shrink-0 ms-auto">
          <div id="authArea"></div>
          <button type="button" id="themeToggle" class="theme-toggle-btn" title="الوضع الليلي/النهاري"></button>
        </div>
      </header>

      <main class="erp-main space-y-4">
        <section class="erp-card">
          <h2 class="text-lg font-extrabold mb-2">الأصناف</h2>
          <div class="grid grid-cols-1 md:grid-cols-6 gap-2">
            <input id="itemCode" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="كود الصنف" />
            <input id="itemName" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="اسم الصنف" />
            <input id="itemBrand" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الماركة" />
            <input id="itemSize" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="المقاس" />
            <select id="itemCategory" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950">
              <option value="rim">جنط</option>
              <option value="set">طقم</option>
              <option value="accessory">اكسسوار</option>
            </select>
            <button id="createItemBtn" class="rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold px-4 py-2">إضافة صنف</button>
          </div>
          <div id="itemsHost" class="mt-3 text-sm"></div>
        </section>

        <section class="erp-card">
          <h2 class="text-lg font-extrabold mb-2">المشتريات</h2>
          <div class="grid grid-cols-1 md:grid-cols-5 gap-2 mb-2">
            <input id="purchaseNo" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="رقم فاتورة الشراء" />
            <input id="purchaseSupplier" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="اسم المورد" />
            <input id="purchaseDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
            <select id="purchaseItem" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
            <input id="purchaseQty" type="number" step="0.01" value="1" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الكمية" />
          </div>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2">
            <input id="purchaseUnitCost" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="تكلفة الشراء" />
            <input id="purchaseExtra" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="مصاريف إضافية" />
            <button id="createPurchaseBtn" class="rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold px-4 py-2">حفظ شراء</button>
            <button id="refreshPurchasesBtn" class="rounded-xl border font-extrabold px-4 py-2">تحديث</button>
          </div>
          <div id="purchasesHost" class="text-sm"></div>
        </section>

        <section class="erp-card">
          <h2 class="text-lg font-extrabold mb-2">المبيعات</h2>
          <div class="grid grid-cols-1 md:grid-cols-5 gap-2 mb-2">
            <input id="saleNo" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="رقم فاتورة البيع" />
            <input id="saleCustomer" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="اسم العميل" />
            <input id="saleDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
            <select id="saleItem" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
            <input id="saleQty" type="number" step="0.01" value="1" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الكمية" />
          </div>
          <div class="grid grid-cols-1 md:grid-cols-5 gap-2 mb-2">
            <input id="salePrice" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="سعر البيع" />
            <input id="saleTax" type="number" step="0.01" value="0" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الضريبة" />
            <select id="salePaymentType" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950">
              <option value="cash">نقد</option>
              <option value="transfer">تحويل</option>
              <option value="credit">آجل</option>
            </select>
            <button id="createSaleBtn" class="rounded-xl bg-violet-600 hover:bg-violet-700 text-white font-extrabold px-4 py-2">حفظ بيع</button>
            <button id="refreshSalesBtn" class="rounded-xl border font-extrabold px-4 py-2">تحديث</button>
          </div>
          <div id="salesHost" class="text-sm"></div>
        </section>

        <section class="erp-card">
          <h2 class="text-lg font-extrabold mb-2">المخزون الحالي</h2>
          <button id="refreshInventoryBtn" class="rounded-xl border font-extrabold px-4 py-2 mb-2">تحديث المخزون</button>
          <div id="inventoryHost" class="text-sm"></div>
        </section>

        <section class="erp-card">
          <h2 class="text-lg font-extrabold mb-2">تقارير الربح وحركة الصنف</h2>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2">
            <input id="reportFrom" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
            <input id="reportTo" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
            <select id="movementItem" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
            <button id="runReportsBtn" class="rounded-xl border font-extrabold px-4 py-2">تشغيل التقارير</button>
          </div>
          <div id="profitHost" class="text-sm mb-3"></div>
          <div id="movementHost" class="text-sm"></div>
        </section>
      </main>
    </div>

    <script src="/static/app.js?v=14"></script>
    <script>
      (function () {
        let items = [];
        function esc(s) { return String(s == null ? "" : s); }
        function fillItems() {
          const opts = items.map((x) => `<option value="${esc(x.id)}">${esc(x.code)} - ${esc(x.name)}</option>`).join("");
          ["purchaseItem", "saleItem", "movementItem"].forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = opts;
          });
        }
        function renderItems() {
          const host = document.getElementById("itemsHost");
          host.innerHTML = items.length
            ? `<div class="grid gap-1">${items.map((x) => `<div class="rounded-lg border px-3 py-2">${esc(x.code)} — ${esc(x.name)} | ${esc(x.brand || "")} ${esc(x.size || "")} | الكمية: ${esc(x.quantity)}</div>`).join("")}</div>`
            : `<div class="opacity-70">لا توجد أصناف</div>`;
          fillItems();
        }
        async function loadItems() {
          const d = await apiGet("/trade/items");
          items = d.items || [];
          renderItems();
        }
        async function loadPurchases() {
          const d = await apiGet("/trade/purchases?limit=100");
          const host = document.getElementById("purchasesHost");
          const rows = d.items || [];
          host.innerHTML = rows.length ? `<div class="grid gap-1">${rows.map((x) => `<div class="rounded-lg border px-3 py-2">${esc(x.purchase_date)} | ${esc(x.invoice_no)} | ${esc(x.supplier_name)} | ${esc(x.total_amount)}</div>`).join("")}</div>` : `<div class="opacity-70">لا توجد مشتريات</div>`;
        }
        async function loadSales() {
          const d = await apiGet("/trade/sales?limit=100");
          const host = document.getElementById("salesHost");
          const rows = d.items || [];
          host.innerHTML = rows.length ? `<div class="grid gap-1">${rows.map((x) => `<div class="rounded-lg border px-3 py-2">${esc(x.sale_date)} | ${esc(x.invoice_no)} | ${esc(x.customer_name)} | ${esc(x.total_amount)} (${esc(x.payment_type)})</div>`).join("")}</div>` : `<div class="opacity-70">لا توجد مبيعات</div>`;
        }
        async function loadInventory() {
          const d = await apiGet("/trade/inventory");
          const host = document.getElementById("inventoryHost");
          const rows = d.items || [];
          host.innerHTML = rows.length
            ? `<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">الكود</th><th class="px-2 py-2">الصنف</th><th class="px-2 py-2">الكمية</th><th class="px-2 py-2">تكلفة الوحدة</th><th class="px-2 py-2">سعر البيع</th><th class="px-2 py-2">قيمة المخزون</th></tr></thead><tbody>${rows.map((x) => `<tr class="border-t"><td class="px-2 py-2">${esc(x.code)}</td><td class="px-2 py-2">${esc(x.name)}</td><td class="px-2 py-2">${esc(x.quantity)}</td><td class="px-2 py-2">${esc(x.cost_price)}</td><td class="px-2 py-2">${esc(x.sale_price)}</td><td class="px-2 py-2">${esc(x.stock_value)}</td></tr>`).join("")}</tbody></table></div>`
            : `<div class="opacity-70">لا يوجد مخزون</div>`;
        }
        async function runReports() {
          const from = document.getElementById("reportFrom").value || "";
          const to = document.getElementById("reportTo").value || "";
          const itemId = document.getElementById("movementItem").value || "";
          const p = await apiGet(`/trade/reports/profit?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`);
          const t = p.totals || {};
          document.getElementById("profitHost").innerHTML = `<div class="grid grid-cols-1 md:grid-cols-4 gap-2"><div class="rounded-xl border px-3 py-2">صافي المبيعات: <b>${esc(t.net_sales || 0)}</b></div><div class="rounded-xl border px-3 py-2">إجمالي التكلفة: <b>${esc(t.cost_total || 0)}</b></div><div class="rounded-xl border px-3 py-2">الربح: <b>${esc(t.profit || 0)}</b></div><div class="rounded-xl border px-3 py-2">هامش الربح%: <b>${esc(t.profit_margin_pct || 0)}</b></div></div>`;
          if (!itemId) return;
          const m = await apiGet(`/trade/reports/item-movement?item_id=${encodeURIComponent(itemId)}&date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`);
          const rows = m.items || [];
          const s = m.summary || {};
          document.getElementById("movementHost").innerHTML = `<div class="mb-2">رصيد أول: <b>${esc(s.opening_qty || 0)}</b> | وارد: <b>${esc(s.qty_in || 0)}</b> | صادر: <b>${esc(s.qty_out || 0)}</b> | رصيد: <b>${esc(s.balance_qty || 0)}</b></div>${rows.length ? `<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">التاريخ</th><th class="px-2 py-2">النوع</th><th class="px-2 py-2">وارد</th><th class="px-2 py-2">صادر</th><th class="px-2 py-2">التكلفة</th></tr></thead><tbody>${rows.map((x) => `<tr class="border-t"><td class="px-2 py-2">${esc(x.date)}</td><td class="px-2 py-2">${esc(x.movement_type)}</td><td class="px-2 py-2">${esc(x.qty_in)}</td><td class="px-2 py-2">${esc(x.qty_out)}</td><td class="px-2 py-2">${esc(x.unit_cost)}</td></tr>`).join("")}</tbody></table></div>` : `<div class="opacity-70">لا توجد حركة للصنف</div>`}`;
        }
        function wire() {
          document.getElementById("createItemBtn").addEventListener("click", async () => {
            try {
              await apiPostJson("/trade/items", {
                code: document.getElementById("itemCode").value || "",
                name: document.getElementById("itemName").value || "",
                brand: document.getElementById("itemBrand").value || "",
                size: document.getElementById("itemSize").value || "",
                category: document.getElementById("itemCategory").value || "rim",
              });
              showToast("تم إضافة الصنف ✔️", "#10b981");
              await loadItems();
            } catch (e) { showToast(e.message || "تعذر إضافة الصنف", "#ef4444"); }
          });
          document.getElementById("createPurchaseBtn").addEventListener("click", async () => {
            try {
              await apiPostJson("/trade/purchases", {
                invoice_no: document.getElementById("purchaseNo").value || "",
                supplier_name: document.getElementById("purchaseSupplier").value || "",
                purchase_date: document.getElementById("purchaseDate").value || "",
                lines: [{ item_id: document.getElementById("purchaseItem").value || "", qty: Number(document.getElementById("purchaseQty").value || 0), unit_cost: Number(document.getElementById("purchaseUnitCost").value || 0), extra_cost: Number(document.getElementById("purchaseExtra").value || 0) }],
              });
              showToast("تم حفظ الشراء ✔️", "#10b981");
              await Promise.all([loadPurchases(), loadInventory(), loadItems()]);
            } catch (e) { showToast(e.message || "تعذر حفظ الشراء", "#ef4444"); }
          });
          document.getElementById("createSaleBtn").addEventListener("click", async () => {
            try {
              await apiPostJson("/trade/sales", {
                invoice_no: document.getElementById("saleNo").value || "",
                customer_name: document.getElementById("saleCustomer").value || "",
                sale_date: document.getElementById("saleDate").value || "",
                payment_type: document.getElementById("salePaymentType").value || "cash",
                lines: [{ item_id: document.getElementById("saleItem").value || "", qty: Number(document.getElementById("saleQty").value || 0), sale_price: Number(document.getElementById("salePrice").value || 0), tax_amount: Number(document.getElementById("saleTax").value || 0) }],
              });
              showToast("تم حفظ البيع ✔️", "#10b981");
              await Promise.all([loadSales(), loadInventory(), loadItems()]);
            } catch (e) { showToast(e.message || "تعذر حفظ البيع", "#ef4444"); }
          });
          document.getElementById("refreshPurchasesBtn").addEventListener("click", () => loadPurchases());
          document.getElementById("refreshSalesBtn").addEventListener("click", () => loadSales());
          document.getElementById("refreshInventoryBtn").addEventListener("click", () => loadInventory());
          document.getElementById("runReportsBtn").addEventListener("click", () => runReports());
        }
        (async function init() {
          await initAuthUI();
          const d = new Date().toISOString().slice(0, 10);
          ["purchaseDate", "saleDate", "reportTo"].forEach((id) => { const el = document.getElementById(id); if (el) el.value = d; });
          const y = new Date().getFullYear() + "-01-01";
          document.getElementById("reportFrom").value = y;
          wire();
          await Promise.all([loadItems(), loadPurchases(), loadSales(), loadInventory()]);
          await runReports();
        })();
      })();
    </script>
  </body>
</html>
