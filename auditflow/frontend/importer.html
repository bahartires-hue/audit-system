<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("auditflow-theme");
          var d = t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", d);
        } catch (e) {}
      })();
    </script>
    <title>مستورد المنتجات | التطابق الأمثل</title>
    <link rel="icon" href="/static/favicon.svg?v=17" type="image/svg+xml" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/tailwind.css?v=17" />
    <link rel="stylesheet" href="/static/dark.css?v=17" />
    <style>
      body {
        font-family: "IBM Plex Sans Arabic", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .preview-img {
        width: 62px;
        height: 62px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.35);
      }
    </style>
  </head>
  <body class="erp-shell bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="toast" class="hidden toast-host text-white px-4 py-3 rounded-xl font-extrabold text-sm"></div>

    <aside class="erp-sidebar" aria-label="القائمة الرئيسية">
      <a href="/" class="erp-sidebar__brand app-brand flex-col items-center gap-1" aria-label="التطابق الأمثل OptimalMatch">
        <span class="app-brand__mark" style="width: 2.35rem; height: 2.35rem">
          <svg width="20" height="20" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 16l5 5 11-11" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
      </a>
      <nav class="erp-sidebar__nav" aria-label="تنقل">
        <a href="/" class="erp-side-link nav-link" data-nav="home" title="الرئيسية"></a>
        <a href="/analyze" class="erp-side-link nav-link" data-nav="analyze" title="تحليل"></a>
        <a href="/convert" class="erp-side-link nav-link" data-nav="convert" title="PDF إلى Excel"></a>
        <a href="/importer" class="erp-side-link nav-link" data-nav="importer" title="مستورد المنتجات"></a>
        <a href="/reports" class="erp-side-link nav-link" data-nav="reports" title="التقارير"></a>
        <a href="/settings" class="erp-side-link nav-link" data-nav="settings" title="لوحة التحكم"></a>
        <a href="/help" class="erp-side-link nav-link" data-nav="help" title="مساعدة"></a>
      </nav>
    </aside>

    <div class="erp-content min-h-0">
      <header class="erp-topbar">
        <button
          type="button"
          id="navMenuBtn"
          class="nav-toggle-btn nav-burger-only"
          aria-controls="mobileNavDrawer"
          aria-expanded="false"
          aria-label="فتح القائمة"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" />
          </svg>
        </button>
        <div class="min-w-0 flex flex-col">
          <span class="erp-topbar__title truncate">المستورد الذكي</span>
          <span class="text-[0.65rem] font-extrabold text-slate-500 dark:text-slate-400 truncate">استيراد منتجات الإطارات + تحسين SEO</span>
        </div>
        <div class="flex items-center gap-2 shrink-0 ms-auto">
          <div id="authArea"></div>
          <button type="button" id="themeToggle" class="theme-toggle-btn"></button>
        </div>
      </header>
      <div id="mobileNavDrawer" class="mobile-nav-drawer md:hidden" role="navigation" aria-label="قائمة الجوال">
        <a href="/" data-nav="home">الرئيسية</a>
        <a href="/analyze" data-nav="analyze">تحليل</a>
        <a href="/convert" data-nav="convert">PDF إلى Excel</a>
        <a href="/importer" data-nav="importer">مستورد المنتجات</a>
        <a href="/reports" data-nav="reports">التقارير</a>
        <a href="/settings" data-nav="settings">لوحة التحكم</a>
        <a href="/help" data-nav="help">مساعدة</a>
      </div>

      <main class="erp-main">
        <div class="max-w-7xl mx-auto w-full px-4 py-6 md:px-6 space-y-4">
          <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5">
            <label class="block text-sm font-extrabold mb-2">رابط صفحة الماركة أو نتائج البحث</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
              <input
                id="siteUrl"
                class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2 md:col-span-2"
                placeholder="https://tireex.com/brands/michelin"
              />
              <select id="siteKeyInp" class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2">
                <option value="tireex">tireex</option>
                <option value="lumitires">lumitires</option>
                <option value="kafaratplus">kafaratplus</option>
                <option value="etar">etar</option>
              </select>
              <input
                id="brandInp"
                class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2"
                placeholder="اسم الماركة (مثال: Michelin)"
              />
              <input
                id="sizeInp"
                class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2"
                placeholder="المقاس اختياري (مثال: 215/55R16)"
              />
              <input
                id="limitInp"
                type="number"
                min="1"
                max="500"
                value="500"
                title="حد أقصى 500 منتج"
                class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2"
              />
              <input
                id="maxPagesInp"
                type="number"
                min="1"
                max="500"
                value="10"
                title="حد أقصى 500 صفحة ترقيم للسحب"
                class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2"
              />
              <select id="pageMode" class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2">
                <option value="single">صفحة واحدة فقط</option>
                <option value="multi">عدة صفحات</option>
              </select>
            </div>
            <div id="scrapeProgressWrap" class="hidden mt-4">
              <div class="flex justify-between items-center text-xs font-extrabold mb-1.5 gap-2">
                <span id="scrapeProgressMsg" class="truncate text-slate-600 dark:text-slate-300">جاري السحب...</span>
                <span id="scrapeProgressPct" class="shrink-0 text-emerald-600 dark:text-emerald-400 tabular-nums">1%</span>
              </div>
              <div class="h-2.5 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
                <div
                  id="scrapeProgressBar"
                  class="h-full bg-gradient-to-l from-emerald-500 to-teal-400 transition-[width] duration-100 ease-linear rounded-full"
                  style="width: 1%"
                ></div>
              </div>
            </div>
            <div class="mt-2">
              <button id="scrapeBtn" class="btn-primary-analyze px-5 py-2 rounded-xl" type="button">سحب المنتجات</button>
              <button id="scrapeUniversalBtn" class="px-5 py-2 rounded-xl border border-slate-300 dark:border-slate-600 ms-2" type="button">
                سحب عام (متعدد المواقع)
              </button>
              <button id="downloadCsvBtn" class="px-5 py-2 rounded-xl border border-slate-300 dark:border-slate-600 ms-2" type="button">تحميل CSV</button>
              <button id="downloadXlsxBtn" class="px-5 py-2 rounded-xl border border-slate-300 dark:border-slate-600 ms-2" type="button">تحميل Excel</button>
              <button id="downloadSallaBtn" class="px-5 py-2 rounded-xl border border-slate-300 dark:border-slate-600 ms-2" type="button">تحميل Excel سلة</button>
            </div>
            <p id="metaInfo" class="text-xs mt-3 text-slate-500 dark:text-slate-400"></p>
          </div>

          <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-3 overflow-auto">
            <table class="min-w-full text-sm">
              <thead>
                <tr class="border-b border-slate-200 dark:border-slate-700">
                  <th class="p-2">الصورة</th>
                  <th class="p-2">الاسم الأصلي</th>
                  <th class="p-2">الاسم المحسن</th>
                  <th class="p-2">الماركة</th>
                  <th class="p-2">الموديل</th>
                  <th class="p-2">المقاس</th>
                  <th class="p-2">السعر</th>
                  <th class="p-2">سنة الصنع</th>
                  <th class="p-2">حالة الصورة</th>
                  <th class="p-2">حالة SEO</th>
                </tr>
              </thead>
              <tbody id="previewRows"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/app.js?v=17"></script>
    <script>
      initAuthUI();
      const rows = document.getElementById("previewRows");
      const metaInfo = document.getElementById("metaInfo");
      const btn = document.getElementById("scrapeBtn");
      const csvBtn = document.getElementById("downloadCsvBtn");
      const xlsxBtn = document.getElementById("downloadXlsxBtn");
      const sallaBtn = document.getElementById("downloadSallaBtn");
      const scrapeUniversalBtn = document.getElementById("scrapeUniversalBtn");
      const urlInp = document.getElementById("siteUrl");
      const siteKeyInp = document.getElementById("siteKeyInp");
      const brandInp = document.getElementById("brandInp");
      const sizeInp = document.getElementById("sizeInp");
      const limitInp = document.getElementById("limitInp");
      const maxPagesInp = document.getElementById("maxPagesInp");
      const pageMode = document.getElementById("pageMode");
      const scrapeProgressWrap = document.getElementById("scrapeProgressWrap");
      const scrapeProgressMsg = document.getElementById("scrapeProgressMsg");
      const scrapeProgressPct = document.getElementById("scrapeProgressPct");
      const scrapeProgressBar = document.getElementById("scrapeProgressBar");

      function setScrapeProgress(visible, pct, msg) {
        scrapeProgressWrap.classList.toggle("hidden", !visible);
        const p = Math.max(1, Math.min(100, Number(pct) || 1));
        scrapeProgressPct.textContent = p + "%";
        scrapeProgressBar.style.width = p + "%";
        if (msg) scrapeProgressMsg.textContent = msg;
      }

      function esc(s) {
        return String(s || "").replace(/[&<>"']/g, function (m) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m];
        });
      }

      function render(items) {
        rows.innerHTML = "";
        items.forEach(function (x) {
          const tr = document.createElement("tr");
          tr.className = "border-b border-slate-100 dark:border-slate-800";
          tr.innerHTML =
            '<td class="p-2">' +
            (x.image_preview ? '<img class="preview-img" src="' + esc(x.image_preview) + '" alt="" />' : "") +
            "</td>" +
            '<td class="p-2">' +
            esc(x.name) +
            "</td>" +
            '<td class="p-2">' +
            esc(x.product_title) +
            "</td>" +
            '<td class="p-2">' +
            esc(x.brand) +
            "</td>" +
            '<td class="p-2">' +
            esc(x.model) +
            "</td>" +
            '<td class="p-2">' +
            esc(x.size) +
            "</td>" +
            '<td class="p-2">' +
            esc(x.price) +
            "</td>" +
            '<td class="p-2">' +
            esc(x.year) +
            "</td>" +
            '<td class="p-2">' +
            esc(x.image_status || "") +
            "</td>" +
            '<td class="p-2">' +
            esc(x.seo_status || "") +
            "</td>";
          rows.appendChild(tr);
        });
      }

      btn.addEventListener("click", async function () {
        const site_url = (urlInp.value || "").trim();
        const brand = (brandInp.value || "").trim();
        const size = (sizeInp.value || "").trim();
        const limit = Math.min(500, Math.max(1, Number(limitInp.value || 100)));
        const max_pages = Math.min(500, Math.max(1, Number(maxPagesInp.value || 10)));
        const multi_pages = pageMode.value === "multi";
        if (!site_url) {
          showToast("أدخل رابط صفحة الماركة أو البحث", "#ef4444");
          return;
        }
        setLoading(btn, true, "جارٍ السحب...");
        setScrapeProgress(true, 1, "بدء السحب...");
        let pollTimer = null;
        try {
          syncCsrfFromCookie();
          const csrf = localStorage.getItem("csrf_token") || "";
          const startRes = await fetch("/importer/scrape/start", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json", Accept: "application/json", "X-CSRF-Token": csrf },
            body: JSON.stringify({ site_url, brand, size, limit, max_pages, multi_pages }),
          });
          if (!startRes.ok) throw new Error(await readErrorMessage(startRes));
          const startData = await startRes.json();
          const jobId = startData.job_id;
          if (!jobId) throw new Error("لم يُرجع الخادم معرف المهمة");

          const pollMs = 200;
          let settled = false;
          const data = await new Promise(function (resolve, reject) {
            const stop = function () {
              if (pollTimer) clearInterval(pollTimer);
              pollTimer = null;
            };
            const tick = async function () {
              if (settled) return;
              try {
                const st = await fetch("/importer/scrape/job/" + encodeURIComponent(jobId), {
                  credentials: "include",
                  headers: { Accept: "application/json" },
                });
                if (!st.ok) {
                  settled = true;
                  stop();
                  reject(new Error(await readErrorMessage(st)));
                  return;
                }
                const j = await st.json();
                const prog = Number(j.progress) || 1;
                setScrapeProgress(true, prog, j.message || "");
                if (j.status === "error") {
                  settled = true;
                  stop();
                  reject(new Error(j.error || j.message || "فشل السحب"));
                  return;
                }
                if (j.done && j.status === "done") {
                  settled = true;
                  stop();
                  resolve(j.result || {});
                  return;
                }
              } catch (err) {
                if (!settled) {
                  settled = true;
                  stop();
                  reject(err);
                }
              }
            };
            pollTimer = setInterval(tick, pollMs);
            tick();
          });
          setScrapeProgress(true, 100, "تم");
          render(data.items || []);
          metaInfo.textContent =
            "تم جلب " +
            (data.count || 0) +
            " منتج - CSV: " +
            (data.csv_path || "") +
            " - XLSX: " +
            (data.xlsx_path || "") +
            " - Salla XLSX: " +
            (data.salla_xlsx_path || "");
          showToast("تم سحب المنتجات بنجاح", "#10b981");
        } catch (e) {
          if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
          }
          showToast(e.message || "فشل سحب المنتجات", "#ef4444");
        } finally {
          setLoading(btn, false, "سحب المنتجات");
          setTimeout(function () {
            setScrapeProgress(false, 1, "");
          }, 600);
        }
      });

      scrapeUniversalBtn.addEventListener("click", async function () {
        const category_url = (urlInp.value || "").trim();
        const site_key = (siteKeyInp.value || "").trim();
        const brand = (brandInp.value || "").trim();
        const max_pages = Math.min(500, Math.max(1, Number(maxPagesInp.value || 10)));
        const limit = Math.min(500, Math.max(0, Number(limitInp.value || 500)));
        if (!category_url) {
          showToast("أدخل رابط الصفحة", "#ef4444");
          return;
        }
        setLoading(scrapeUniversalBtn, true, "جارٍ السحب العام...");
        try {
          syncCsrfFromCookie();
          const csrf = localStorage.getItem("csrf_token") || "";
          const res = await fetch("/importer/universal/scrape", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json", Accept: "application/json", "X-CSRF-Token": csrf },
            body: JSON.stringify({ site_key, category_url, brand, max_pages, limit }),
          });
          if (!res.ok) throw new Error(await readErrorMessage(res));
          const data = await res.json();
          render(data.items || []);
          metaInfo.textContent = "تم السحب العام: " + (data.count || 0) + " منتج - CSV: " + (data.csv_path || "");
          showToast("تم السحب العام بنجاح", "#10b981");
        } catch (e) {
          showToast(e.message || "فشل السحب العام", "#ef4444");
        } finally {
          setLoading(scrapeUniversalBtn, false, "سحب عام (متعدد المواقع)");
        }
      });

      csvBtn.addEventListener("click", function () {
        window.location.href = "/importer/csv";
      });
      xlsxBtn.addEventListener("click", function () {
        window.location.href = "/importer/xlsx";
      });
      sallaBtn.addEventListener("click", function () {
        window.location.href = "/importer/salla-xlsx";
      });
    </script>
  </body>
</html>
