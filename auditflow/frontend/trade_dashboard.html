<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الرئيسية | تجارة الجنوط</title>
    <link rel="stylesheet" href="/static/tailwind.css?v=9" />
    <link rel="stylesheet" href="/static/dark.css?v=9" />
    <style>
      .top-alert { background: #ea580c; color: #fff; padding: 6px 12px; font-size: 12px; font-weight: 700; }
      .layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: calc(100vh - 24px); }
      .sidebar { background: linear-gradient(180deg, #2d1ea8, #3f2bbf); color: #fff; padding: 14px 12px; }
      .side-link { display: flex; align-items: center; justify-content: space-between; border-radius: 10px; padding: 9px 10px; font-weight: 800; color: #dbeafe; border: 1px solid transparent; }
      .side-link:hover { background: rgba(255,255,255,.08); }
      .side-link.active { background: rgba(255,255,255,.16); color: #fff; border-color: rgba(255,255,255,.25); }
      .side-menu-btn { width: 100%; background: transparent; cursor: pointer; text-align: right; }
      .submenu { display: none; margin: 4px 0 8px; padding-right: 10px; border-right: 1px solid rgba(255,255,255,.2); }
      .submenu.open { display: grid; gap: 4px; }
      .sub-link { display: block; border-radius: 8px; padding: 7px 9px; font-size: 13px; color: #e0e7ff; }
      .sub-link:hover { background: rgba(255,255,255,.08); }
      .content { background: #f3f4f6; padding: 12px; }
      .header-bar { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; }
      .kpi-card { border-radius: 10px; padding: 10px 12px; border: 1px solid #e5e7eb; background: #fff; min-height: 82px; }
      .kpi-val { color: #4f46e5; font-size: 30px; font-weight: 900; line-height: 1; margin-top: 8px; }
      .soft-card { border-radius: 10px; border: 1px solid #e5e7eb; background: #fff; padding: 10px; }
      @media (max-width: 1024px) { .layout { grid-template-columns: 1fr; } .sidebar { border-radius: 10px; margin-bottom: 10px; } }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen">
    <div class="top-alert">متبقي 14 يوماً على نهاية الفترة المجانية</div>
    <div class="max-w-[1700px] mx-auto">
      <div class="layout">
        <aside class="sidebar">
          <div class="text-2xl font-extrabold mb-4">SmartPOS</div>
          <a class="side-link active" href="/trade"><span>لوحة التحكم</span><span>⌂</span></a>
          <button id="salesMenuToggle" class="side-link side-menu-btn mt-1" type="button"><span>المبيعات</span><span id="salesMenuArrow">▾</span></button>
          <div id="salesSubmenu" class="submenu open">
            <a class="sub-link" href="/trade/sales">الفواتير</a>
            <a class="sub-link" href="/trade/reports#returns">المرتجع</a>
            <a class="sub-link" href="/trade/master-data">العملاء</a>
            <a class="sub-link" href="/trade/reports#movement">تقرير حركة مبيعات</a>
            <a class="sub-link" href="/trade/reports#customer-statement">كشف حساب العميل</a>
          </div>
          <a class="side-link mt-1" href="/trade/purchases"><span>المشتريات</span><span>◀</span></a>
          <a class="side-link mt-1" href="/trade/inventory"><span>المخزون</span><span>◀</span></a>
          <a class="side-link mt-1" href="/trade/items"><span>الأصناف</span><span>◀</span></a>
          <a class="side-link mt-1" href="/trade/master-data"><span>البيانات الأساسية</span><span>◀</span></a>
          <a class="side-link mt-1" href="/trade/reports"><span>التقارير</span><span>◀</span></a>
          <a class="side-link mt-1" href="/trade/users"><span>المستخدمين</span><span>◀</span></a>
          <a class="side-link mt-1" href="/trade/settings"><span>الإعدادات</span><span>◀</span></a>
          <a class="side-link mt-1" href="/trade/sales"><span>نظام الكاشير</span><span>◀</span></a>
        </aside>

        <main class="content space-y-3">
          <div class="header-bar flex items-center justify-between">
            <div>
              <div class="text-xs opacity-70">الفرع الرئيسي</div>
              <h1 class="text-2xl font-extrabold">لوحة التحكم</h1>
            </div>
            <div class="flex items-center gap-2">
              <button id="themeToggle" class="theme-toggle-btn" type="button"></button>
              <div id="authArea"></div>
            </div>
          </div>

          <div class="soft-card">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <input id="fromDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
              <input id="toDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
              <button id="refreshBtn" class="rounded-xl border font-extrabold px-4 py-2">تحديث</button>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-4 gap-3" id="summaryCards"></div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <section class="soft-card">
              <h2 class="font-extrabold mb-2">آخر عمليات بيع</h2>
              <div id="recentSalesHost" class="space-y-1"></div>
            </section>
            <section class="soft-card">
              <h2 class="font-extrabold mb-2">آخر عمليات شراء</h2>
              <div id="recentPurchasesHost" class="space-y-1"></div>
            </section>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="extraStatsHost"></div>
        </main>
      </div>
    </div>
    <script src="/static/app.js?v=14"></script>
    <script>
      (async function () {
        await initAuthUI();
        function card(title, value) {
          return `<div class="kpi-card"><div class="text-sm font-bold">${title}</div><div class="kpi-val">${value}</div></div>`;
        }
        function row(text) {
          return `<div class="rounded-lg border px-3 py-2 text-sm">${text}</div>`;
        }
        async function loadSummary() {
          const from = document.getElementById("fromDate").value || "";
          const to = document.getElementById("toDate").value || "";
          const [d1, d2, pr, ex] = await Promise.all([
            apiGet(`/api/trade/dashboard-summary?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`),
            apiGet("/api/cashierko/dashboard/overview"),
            apiGet(`/api/trade/reports/profit?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`),
            apiGet(`/api/cashierko/expenses?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}&limit=500`),
          ]);
          const t = d1.totals || {};
          const c = d2.totals || {};
          const p = (pr && pr.totals) || {};
          const expenses = Number((ex && ex.totals && ex.totals.amount) || 0);
          const profitBefore = Number(p.profit || 0);
          const profitAfter = profitBefore - expenses;
          document.getElementById("summaryCards").innerHTML = [
            card("إجمالي المبيعات", Number(t.sales || 0).toFixed(2)),
            card("إجمالي المشتريات", Number(t.purchases || 0).toFixed(2)),
            card("إجمالي المصروفات", expenses.toFixed(2)),
            card("الربح بعد المصروفات", profitAfter.toFixed(2)),
            card("قيمة المخزون", Number(t.inventory_value || c.inventory_value || 0).toFixed(2)),
            card("الأصناف الناقصة", Number(c.low_stock_items || 0)),
          ].join("");
          const recentSales = d2.recent_sales || [];
          const recentPurchases = d2.recent_purchases || [];
          document.getElementById("recentSalesHost").innerHTML = recentSales.length
            ? recentSales.map((x) => row(`${x.sale_date} | ${x.invoice_no} | ${x.customer_name} | ${Number(x.total_amount || 0).toFixed(2)}`)).join("")
            : `<div class="opacity-70 text-sm">لا توجد مبيعات</div>`;
          document.getElementById("recentPurchasesHost").innerHTML = recentPurchases.length
            ? recentPurchases.map((x) => row(`${x.purchase_date} | ${x.invoice_no} | ${x.supplier_name} | ${Number(x.total_amount || 0).toFixed(2)}`)).join("")
            : `<div class="opacity-70 text-sm">لا توجد مشتريات</div>`;
          document.getElementById("extraStatsHost").innerHTML = [
            `<div class="soft-card"><div class="text-xs opacity-70">عدد الفواتير اليوم</div><div class="text-2xl font-extrabold">${Number(c.sales_invoices_today || 0)}</div></div>`,
            `<div class="soft-card"><div class="text-xs opacity-70">الربح قبل المصروفات</div><div class="text-2xl font-extrabold">${profitBefore.toFixed(2)}</div></div>`,
            `<div class="soft-card"><div class="text-xs opacity-70">قيمة المخزون</div><div class="text-2xl font-extrabold">${Number(t.inventory_value || c.inventory_value || 0).toFixed(2)}</div></div>`,
          ].join("");
        }
        const now = new Date();
        document.getElementById("toDate").value = now.toISOString().slice(0, 10);
        document.getElementById("fromDate").value = `${now.getFullYear()}-01-01`;
        document.getElementById("refreshBtn").addEventListener("click", loadSummary);
        document.getElementById("salesMenuToggle").addEventListener("click", () => {
          const menu = document.getElementById("salesSubmenu");
          const arrow = document.getElementById("salesMenuArrow");
          const open = menu.classList.toggle("open");
          arrow.textContent = open ? "▾" : "▸";
        });
        await loadSummary();
      })();
    </script>
  </body>
</html>
