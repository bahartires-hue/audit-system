<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الرئيسية | تجارة الجنوط</title>
    <link rel="stylesheet" href="/static/tailwind.css?v=9" />
    <link rel="stylesheet" href="/static/dark.css?v=9" />
    <style>
      .layout { display: grid; grid-template-columns: 240px 1fr; gap: 14px; }
      .side-link { display: block; border-radius: 12px; padding: 10px 12px; font-weight: 800; border: 1px solid #e5e7eb; }
      .side-link.active { background: #f59e0b; color: #fff; border-color: #f59e0b; }
      .kpi-card { border-radius: 14px; padding: 14px; color: #fff; min-height: 90px; }
      .kpi-green { background: linear-gradient(135deg, #10b981, #059669); }
      .kpi-blue { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
      .kpi-orange { background: linear-gradient(135deg, #fb923c, #f97316); }
      .kpi-indigo { background: linear-gradient(135deg, #6366f1, #4f46e5); }
      .soft-card { border-radius: 14px; border: 1px solid #e5e7eb; background: #fff; padding: 12px; }
      @media (max-width: 1024px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="max-w-[1500px] mx-auto p-3">
      <div class="layout">
        <aside class="rounded-2xl border bg-white dark:bg-slate-950 p-3 h-fit">
          <div class="text-lg font-extrabold mb-3">كاشيركو ويب</div>
          <a class="side-link active" href="/trade">الرئيسية</a>
          <a class="side-link mt-2" href="/trade/sales">المبيعات</a>
          <a class="side-link mt-2" href="/trade/purchases">المشتريات</a>
          <a class="side-link mt-2" href="/trade/inventory">المخزون</a>
          <a class="side-link mt-2" href="/trade/items">الأصناف</a>
          <a class="side-link mt-2" href="/trade/master-data">البيانات الأساسية</a>
          <a class="side-link mt-2" href="/trade/transfers">التحويلات</a>
          <a class="side-link mt-2" href="/trade/reports">التقارير</a>
          <a class="side-link mt-2" href="/trade/settings">الإعدادات</a>
          <a class="side-link mt-2" href="/trade/users">المستخدمين</a>
        </aside>

        <main class="space-y-3">
          <div class="rounded-2xl border bg-white dark:bg-slate-950 p-3 flex items-center justify-between">
            <div>
              <div class="text-xs opacity-70">الفرع الرئيسي</div>
              <h1 class="text-2xl font-extrabold">لوحة التحكم</h1>
            </div>
            <div class="flex items-center gap-2">
              <button id="themeToggle" class="theme-toggle-btn" type="button"></button>
              <div id="authArea"></div>
            </div>
          </div>

          <div class="soft-card">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <input id="fromDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
              <input id="toDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
              <button id="refreshBtn" class="rounded-xl border font-extrabold px-4 py-2">تحديث</button>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-4 gap-3" id="summaryCards"></div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <section class="soft-card">
              <h2 class="font-extrabold mb-2">آخر عمليات بيع</h2>
              <div id="recentSalesHost" class="space-y-1"></div>
            </section>
            <section class="soft-card">
              <h2 class="font-extrabold mb-2">آخر عمليات شراء</h2>
              <div id="recentPurchasesHost" class="space-y-1"></div>
            </section>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="extraStatsHost"></div>
        </div>
      </div>
    </div>
    <script src="/static/app.js?v=14"></script>
    <script>
      (async function () {
        await initAuthUI();
        function card(title, value, cls) {
          return `<div class="kpi-card ${cls}"><div class="text-xs opacity-90">${title}</div><div class="text-3xl font-extrabold mt-2">${value}</div></div>`;
        }
        function row(text) {
          return `<div class="rounded-lg border px-3 py-2 text-sm">${text}</div>`;
        }
        async function loadSummary() {
          const from = document.getElementById("fromDate").value || "";
          const to = document.getElementById("toDate").value || "";
          const [d1, d2] = await Promise.all([
            apiGet(`/api/trade/dashboard-summary?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`),
            apiGet("/api/cashierko/dashboard/overview"),
          ]);
          const t = d1.totals || {};
          const c = d2.totals || {};
          document.getElementById("summaryCards").innerHTML = [
            card("المبيعات", Number(t.sales || 0).toFixed(2), "kpi-green"),
            card("المشتريات", Number(t.purchases || 0).toFixed(2), "kpi-blue"),
            card("مرتجع مبيعات", Number(0).toFixed(2), "kpi-orange"),
            card("مرتجع مشتريات", Number(0).toFixed(2), "kpi-indigo"),
          ].join("");
          const recentSales = d2.recent_sales || [];
          const recentPurchases = d2.recent_purchases || [];
          document.getElementById("recentSalesHost").innerHTML = recentSales.length
            ? recentSales.map((x) => row(`${x.sale_date} | ${x.invoice_no} | ${x.customer_name} | ${Number(x.total_amount || 0).toFixed(2)}`)).join("")
            : `<div class="opacity-70 text-sm">لا توجد مبيعات</div>`;
          document.getElementById("recentPurchasesHost").innerHTML = recentPurchases.length
            ? recentPurchases.map((x) => row(`${x.purchase_date} | ${x.invoice_no} | ${x.supplier_name} | ${Number(x.total_amount || 0).toFixed(2)}`)).join("")
            : `<div class="opacity-70 text-sm">لا توجد مشتريات</div>`;
          document.getElementById("extraStatsHost").innerHTML = [
            `<div class="soft-card"><div class="text-xs opacity-70">عدد الفواتير اليوم</div><div class="text-2xl font-extrabold">${Number(c.sales_invoices_today || 0)}</div></div>`,
            `<div class="soft-card"><div class="text-xs opacity-70">أصناف ناقصة</div><div class="text-2xl font-extrabold">${Number(c.low_stock_items || 0)}</div></div>`,
            `<div class="soft-card"><div class="text-xs opacity-70">قيمة المخزون</div><div class="text-2xl font-extrabold">${Number(c.inventory_value || 0).toFixed(2)}</div></div>`,
          ].join("");
        }
        const now = new Date();
        document.getElementById("toDate").value = now.toISOString().slice(0, 10);
        document.getElementById("fromDate").value = `${now.getFullYear()}-01-01`;
        document.getElementById("refreshBtn").addEventListener("click", loadSummary);
        await loadSummary();
      })();
    </script>
  </body>
</html>
