<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الرئيسية | تجارة الجنوط</title>
    <link rel="stylesheet" href="/static/tailwind.css?v=9" />
    <link rel="stylesheet" href="/static/dark.css?v=9" />
  </head>
  <body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 space-y-4">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-extrabold">لوحة التحكم</h1>
        <div class="flex items-center gap-2">
          <div id="authArea"></div>
          <button id="themeToggle" class="theme-toggle-btn" type="button"></button>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        <a class="px-3 py-2 rounded-xl border font-bold" href="/trade">الرئيسية</a>
        <a class="px-3 py-2 rounded-xl border font-bold" href="/trade/items">الأصناف</a>
        <a class="px-3 py-2 rounded-xl border font-bold" href="/trade/purchases">المشتريات</a>
        <a class="px-3 py-2 rounded-xl border font-bold" href="/trade/sales">المبيعات</a>
        <a class="px-3 py-2 rounded-xl border font-bold" href="/trade/inventory">المخزون</a>
        <a class="px-3 py-2 rounded-xl border font-bold" href="/trade/reports">التقارير</a>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-3" id="summaryCards"></div>
      <div class="rounded-xl border p-4 bg-white dark:bg-slate-950">
        <h2 class="font-extrabold mb-2">فلاتر الملخص</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
          <input id="fromDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
          <input id="toDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
          <button id="refreshBtn" class="rounded-xl border font-extrabold px-4 py-2">تحديث</button>
        </div>
      </div>
    </div>
    <script src="/static/app.js?v=14"></script>
    <script>
      (async function () {
        await initAuthUI();
        function card(title, value) {
          return `<div class="rounded-xl border p-4 bg-white dark:bg-slate-950"><div class="text-xs opacity-70">${title}</div><div class="text-2xl font-extrabold">${value}</div></div>`;
        }
        async function loadSummary() {
          const from = document.getElementById("fromDate").value || "";
          const to = document.getElementById("toDate").value || "";
          const d = await apiGet(`/trade/dashboard-summary?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`);
          const t = d.totals || {};
          document.getElementById("summaryCards").innerHTML = [
            card("إجمالي المبيعات", Number(t.sales || 0).toFixed(2)),
            card("إجمالي المشتريات", Number(t.purchases || 0).toFixed(2)),
            card("إجمالي المخزون (قيمة)", Number(t.inventory_value || 0).toFixed(2)),
            card("إجمالي المخزون (كمية)", Number(t.inventory_qty || 0).toFixed(4)),
          ].join("");
        }
        const now = new Date();
        document.getElementById("toDate").value = now.toISOString().slice(0, 10);
        document.getElementById("fromDate").value = `${now.getFullYear()}-01-01`;
        document.getElementById("refreshBtn").addEventListener("click", loadSummary);
        await loadSummary();
      })();
    </script>
  </body>
</html>
