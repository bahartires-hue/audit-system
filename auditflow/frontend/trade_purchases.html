<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>المشتريات</title><link rel="stylesheet" href="/static/tailwind.css?v=9" /><link rel="stylesheet" href="/static/dark.css?v=9" /></head>
<body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-7xl mx-auto p-4 space-y-4">
<div class="flex flex-wrap gap-2"><a class="px-3 py-2 rounded-xl border font-bold" href="/trade">الرئيسية</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/items">الأصناف</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/purchases">المشتريات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/sales">المبيعات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/inventory">المخزون</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/reports">التقارير</a></div>
<div class="rounded-xl border p-4 bg-white dark:bg-slate-950">
<h1 class="text-xl font-extrabold mb-2">فاتورة شراء</h1>
<div class="grid grid-cols-1 md:grid-cols-6 gap-2">
<input id="no" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="رقم الفاتورة" />
<input id="supplier" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="المورد" />
<input id="date" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<select id="item" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<input id="qty" type="number" step="0.01" value="1" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الكمية" />
<input id="unit" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="تكلفة الشراء" />
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-2 mt-2">
<input id="extra" type="number" step="0.01" value="0" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="تكلفة إضافية" />
<button id="saveBtn" class="rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold px-4 py-2">حفظ</button>
<button id="refreshBtn" class="rounded-xl border font-extrabold px-4 py-2">تحديث</button>
</div></div>
<div class="rounded-xl border p-4 bg-white dark:bg-slate-950"><div id="host"></div></div>
</div>
<script src="/static/app.js?v=14"></script>
<script>
(async function(){await initAuthUI();function esc(s){return String(s==null?"":s);}
async function loadItems(){const d=await apiGet("/api/trade/items");const rows=d.items||[];document.getElementById("item").innerHTML=rows.map(x=>`<option value="${esc(x.id)}">${esc(x.code)} - ${esc(x.name)}</option>`).join("");}
async function loadPurchases(){const d=await apiGet("/api/trade/purchases?limit=200");const rows=d.items||[];document.getElementById("host").innerHTML=rows.length?`<div class="grid gap-1">${rows.map(x=>`<div class="rounded-lg border px-3 py-2">${esc(x.purchase_date)} | ${esc(x.invoice_no)} | ${esc(x.supplier_name)} | ${esc(x.total_amount)}</div>`).join("")}</div>`:`<div class="opacity-70">لا توجد مشتريات</div>`;}
document.getElementById("saveBtn").addEventListener("click",async()=>{try{await apiPostJson("/api/trade/purchases",{invoice_no:document.getElementById("no").value||"",supplier_name:document.getElementById("supplier").value||"",purchase_date:document.getElementById("date").value||"",lines:[{item_id:document.getElementById("item").value||"",qty:Number(document.getElementById("qty").value||0),unit_cost:Number(document.getElementById("unit").value||0),extra_cost:Number(document.getElementById("extra").value||0)}]});showToast("تم حفظ الشراء ✔️","#10b981");await loadPurchases();}catch(e){showToast(e.message||"فشل الحفظ","#ef4444");}});
document.getElementById("refreshBtn").addEventListener("click",loadPurchases);document.getElementById("date").value=new Date().toISOString().slice(0,10);await loadItems();await loadPurchases();})();
</script></body></html>
