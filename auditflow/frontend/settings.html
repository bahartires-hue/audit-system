<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("auditflow-theme");
          var d = t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", d);
        } catch (e) {}
      })();
    </script>
    <title>الإعدادات | التطابق الأمثل | OptimalMatch</title>
    <link rel="icon" href="/static/favicon.svg?v=6" type="image/svg+xml" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/tailwind.css?v=6" />
    <link rel="stylesheet" href="/static/dark.css?v=6" />
    <style>
      body {
        font-family: "IBM Plex Sans Arabic", system-ui, sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="toast" class="hidden toast-host text-white px-4 py-3 rounded-xl font-extrabold text-sm"></div>
    <header class="sticky top-0 z-40 border-b border-slate-200 dark:border-slate-700 bg-white/90 dark:bg-slate-900/90 backdrop-blur">
      <div class="max-w-6xl mx-auto px-4 py-3">
        <div class="flex items-center justify-between gap-3">
          <a href="/" class="app-brand" aria-label="التطابق الأمثل OptimalMatch الصفحة الرئيسية">
            <span class="app-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 16l5 5 11-11" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span class="app-brand__wordmark">
              <span class="app-brand__text">التطابق الأمثل</span>
              <span class="app-brand__en" dir="ltr">OptimalMatch</span>
            </span>
          </a>
          <nav class="nav-desktop-only" aria-label="التنقل الرئيسي">
            <a href="/" data-nav="home">لوحة التحكم</a>
            <a href="/analyze" data-nav="analyze">تحليل</a>
            <a href="/reports" data-nav="reports">التقارير</a>
            <a href="/settings" data-nav="settings">الإعدادات</a>
          </nav>
          <div class="flex items-center gap-2 shrink-0">
            <div id="authArea"></div>
            <button type="button" id="themeToggle" class="theme-toggle-btn" title="الوضع الليلي/النهاري"></button>
            <button
              type="button"
              id="navMenuBtn"
              class="nav-toggle-btn nav-burger-only"
              aria-controls="mobileNavDrawer"
              aria-expanded="false"
              aria-label="فتح القائمة"
            >
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>
        <div id="mobileNavDrawer" class="mobile-nav-drawer" role="navigation" aria-label="قائمة الجوال">
          <a href="/" data-nav="home">لوحة التحكم</a>
          <a href="/analyze" data-nav="analyze">تحليل</a>
          <a href="/reports" data-nav="reports">التقارير</a>
          <a href="/settings" data-nav="settings">الإعدادات</a>
        </div>
      </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 py-8">
      <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 shadow-sm">
        <h1 class="text-2xl font-extrabold text-slate-900 dark:text-slate-50">إعدادات الحساب</h1>
        <p class="text-slate-600 dark:text-slate-400 mt-2">تغيير كلمة المرور.</p>
        <div class="mt-6 grid gap-3">
          <input
            id="oldPass"
            type="password"
            placeholder="كلمة المرور الحالية"
            class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2 text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
          />
          <input
            id="newPass"
            type="password"
            placeholder="كلمة المرور الجديدة (8 أحرف على الأقل)"
            class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2 text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
          />
          <button
            id="changePassBtn"
            class="px-4 py-2 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-extrabold w-fit hover:bg-slate-800 dark:hover:bg-slate-200"
          >
            تغيير كلمة المرور
          </button>
        </div>
      </div>
    </main>
    <footer class="max-w-4xl mx-auto px-4 pb-8 text-center text-slate-500 dark:text-slate-400 text-sm font-extrabold">
      تطوير الموقع: محمد علي السوداني
    </footer>
    <script src="/static/app.js?v=6"></script>
    <script>
      initAuthUI();
      document.getElementById("changePassBtn").addEventListener("click", async () => {
        const old_password = document.getElementById("oldPass").value || "";
        const new_password = document.getElementById("newPass").value || "";
        try {
          await apiPostJson("/auth/change-password", { old_password, new_password });
          showToast("تم تغيير كلمة المرور ✔️");
          document.getElementById("oldPass").value = "";
          document.getElementById("newPass").value = "";
        } catch (e) {
          showToast(e.message || "فشل تغيير كلمة المرور", "#ef4444");
        }
      });
    </script>
  </body>
</html>
