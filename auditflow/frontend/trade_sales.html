<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المبيعات</title>
  <link rel="stylesheet" href="/static/tailwind.css?v=9" />
  <link rel="stylesheet" href="/static/dark.css?v=9" />
  <style>
    .panel{border:1px solid #cbd5e1;border-radius:10px;background:#fff}
    .field{height:34px;border-radius:4px;border:1px solid #cbd5e1;padding:4px 8px;background:#fff}
    .lbl{font-size:12px;font-weight:700;color:#0f172a}
    .cmd{height:30px;border:1px solid #94a3b8;border-radius:4px;padding:0 10px;font-weight:700;background:#fff}
    .cmd-primary{background:#16a34a;color:#fff;border-color:#16a34a}
    .cmd-accent{background:#2563eb;color:#fff;border-color:#2563eb}
    .top-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;align-items:end}
    .line-grid{display:grid;grid-template-columns:2fr .7fr .9fr .8fr auto;gap:6px;align-items:end}
    .footer-grid{display:grid;grid-template-columns:1.1fr 1fr auto auto auto;gap:6px;align-items:center}
    .bottom-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
    @media (max-width:1100px){.top-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.line-grid{grid-template-columns:1fr 1fr}.footer-grid{grid-template-columns:1fr}}
  </style>
</head>
<body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
  <div class="max-w-[1700px] mx-auto p-2 space-y-2">
    <div class="panel p-2 flex items-center justify-between">
      <div class="text-base font-extrabold">المبيعات - نمط كاشير احترافي</div>
      <div class="flex items-center gap-2">
        <div id="formMode" class="text-xs opacity-70">وضع: إضافة جديدة</div>
        <div id="authArea"></div>
      </div>
    </div>

    <section class="panel p-2">
      <div class="top-grid">
        <div><div class="lbl">رقم الفاتورة</div><input id="no" class="field w-full" placeholder="14916" /></div>
        <div><div class="lbl">التاريخ</div><input id="date" type="date" class="field w-full" /></div>
        <div><div class="lbl">طريقة الدفع</div><select id="pay" class="field w-full"><option value="cash">نقد</option><option value="transfer">تحويل</option><option value="credit">آجل</option></select></div>
        <div><div class="lbl">العميل</div><input id="customer" class="field w-full" placeholder="عميل عام" /></div>
        <div><div class="lbl">بحث بالفواتير</div><input id="searchInput" class="field w-full" placeholder="بحث..." /></div>
        <div><div class="lbl">خصم الفاتورة</div><input id="discount" type="number" step="0.01" class="field w-full" /></div>
      </div>

      <div class="line-grid mt-2">
        <div>
          <div class="lbl">بحث الصنف</div>
          <input id="itemSearchLine" class="field w-full" list="itemOptions" placeholder="اكتب الكود أو الاسم" />
          <datalist id="itemOptions"></datalist>
          <select id="item" class="hidden"></select>
        </div>
        <div><div class="lbl">الكمية</div><input id="qty" type="number" step="0.01" value="1" class="field w-full" /></div>
        <div><div class="lbl">سعر البيع</div><input id="price" type="number" step="0.01" class="field w-full" /></div>
        <div><div class="lbl">الضريبة</div><input id="tax" type="number" step="0.01" class="field w-full" /></div>
        <div class="pt-5"><button id="addLineBtn" class="cmd cmd-accent w-full">إضافة بند</button></div>
      </div>
    </section>

    <section class="panel p-2 min-h-[230px] overflow-auto">
      <div id="cartHost"></div>
    </section>

    <section class="panel p-2">
      <div class="footer-grid">
        <div id="totalsHost" class="field !h-auto py-2 font-bold text-sm"></div>
        <div class="text-sm font-semibold">حفظ / تعديل / طباعة / بحث</div>
        <button id="saveBtn" class="cmd cmd-primary">حفظ</button>
        <button id="printCurrentBtn" class="cmd">طباعة</button>
        <button id="resetBtn" class="cmd">جديد</button>
      </div>
    </section>

    <section class="panel p-2 overflow-auto">
      <div id="host"></div>
    </section>
  </div>

  <script src="/static/app.js?v=14"></script>
  <script>
    (async function () {
      await initAuthUI();

      function esc(s) { return String(s == null ? "" : s); }
      function money(n) { return Number(n || 0).toFixed(2); }
      function paymentLabel(v) { if (v === "cash") return "نقد"; if (v === "transfer") return "تحويل"; if (v === "credit") return "آجل"; return v || ""; }

      async function apiPutJson(url, body) {
        const csrf = localStorage.getItem("csrf_token") || "";
        const res = await fetch(url, {
          method: "PUT",
          credentials: "include",
          headers: { Accept: "application/json", "Content-Type": "application/json", "X-CSRF-Token": csrf },
          body: JSON.stringify(body || {}),
        });
        if (!res.ok) throw new Error(await readErrorMessage(res));
        return res.json();
      }

      let items = [];
      let salesRows = [];
      let cart = [];
      let editingId = null;
      let lastPrintedId = null;
      let appSettings = { shop_name: "كاشيركو", currency: "SAR", print_size: "A4", thermal_header: "شكراً لزيارتكم", tax_rate: 0 };
      async function loadSettings() {
        try {
          const d = await apiGet("/api/cashierko/settings");
          appSettings = { ...appSettings, ...(d.settings || {}) };
          if (!editingId) document.getElementById("tax").value = Number(appSettings.tax_rate || 0).toFixed(2);
        } catch (_) {}
      }

      function totals() {
        const discount = Number(document.getElementById("discount").value || 0);
        const gross = cart.reduce((s, x) => s + Number(x.qty) * Number(x.sale_price) + Number(x.tax_amount), 0);
        return { gross, discount, net: Math.max(0, gross - discount) };
      }

      function renderCart() {
        const host = document.getElementById("cartHost");
        const t = totals();
        document.getElementById("totalsHost").innerHTML = `الإجمالي: ${money(t.gross)} | الخصم: ${money(t.discount)} | الصافي: ${money(t.net)}`;
        host.innerHTML = cart.length
          ? `<div class="rounded-lg border overflow-auto"><table class="w-full min-w-[900px] text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2 text-right">الصنف</th><th class="px-2 py-2 text-right">الكمية</th><th class="px-2 py-2 text-right">السعر</th><th class="px-2 py-2 text-right">الضريبة</th><th class="px-2 py-2 text-right">الإجمالي</th><th class="px-2 py-2 text-right">حذف</th></tr></thead><tbody>${cart.map((x,i)=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.item_label)}</td><td class="px-2 py-2">${esc(x.qty)}</td><td class="px-2 py-2">${money(x.sale_price)}</td><td class="px-2 py-2">${money(x.tax_amount)}</td><td class="px-2 py-2">${money(Number(x.qty)*Number(x.sale_price)+Number(x.tax_amount))}</td><td class="px-2 py-2"><button class="rounded-lg border px-2 py-1" data-del="${i}">✕</button></td></tr>`).join("")}</tbody></table></div>`
          : `<div class="opacity-70 text-sm">لا توجد بنود بعد</div>`;
        host.querySelectorAll("[data-del]").forEach((btn) => btn.addEventListener("click", () => {
          cart.splice(Number(btn.getAttribute("data-del")), 1);
          renderCart();
        }));
      }

      function resetForm() {
        editingId = null;
        cart = [];
        document.getElementById("formMode").textContent = "وضع: إضافة جديدة";
        document.getElementById("saveBtn").textContent = "حفظ الفاتورة";
        document.getElementById("no").value = nextInvoiceNo("S-", salesRows);
        document.getElementById("customer").value = "";
        document.getElementById("date").value = new Date().toISOString().slice(0, 10);
        document.getElementById("pay").value = "cash";
        document.getElementById("discount").value = "";
        document.getElementById("qty").value = "1";
        document.getElementById("tax").value = Number(appSettings.tax_rate || 0).toFixed(2);
        document.getElementById("itemSearchLine").value = "";
        renderCart();
      }

      function payloadFromForm() {
        return {
          invoice_no: document.getElementById("no").value || `S-${Date.now()}`,
          customer_name: document.getElementById("customer").value || "عميل نقدي",
          sale_date: document.getElementById("date").value || new Date().toISOString().slice(0, 10),
          payment_type: document.getElementById("pay").value || "cash",
          discount: Number(document.getElementById("discount").value || 0),
          lines: cart.map((x) => ({
            item_id: x.item_id,
            qty: Number(x.qty),
            sale_price: Number(x.sale_price),
            tax_amount: Number(x.tax_amount),
          })),
        };
      }

      function printInvoice(d) {
        const lines = d.lines || [];
        const thermal = String(appSettings.print_size || "A4").toLowerCase() === "80mm";
        const html = `<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>فاتورة ${esc(d.invoice_no)}</title><style>body{font-family:Arial;padding:${thermal ? "6px" : "14px"};font-size:${thermal ? "12px" : "14px"}}.invoice{max-width:${thermal ? "280px" : "900px"};margin:0 auto}table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border:1px solid #ddd;padding:${thermal ? "4px" : "6px"};text-align:right}</style></head><body><div class="invoice"><h2>${esc(appSettings.shop_name || "كاشيركو")}</h2><div>${esc(appSettings.thermal_header || "")}</div><div>رقم الفاتورة: <b>${esc(d.invoice_no)}</b></div><div>التاريخ: <b>${esc(d.sale_date)}</b></div><div>العميل: <b>${esc(d.customer_name)}</b></div><div>الدفع: <b>${esc(paymentLabel(d.payment_type))}</b></div><table><thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الضريبة</th><th>الإجمالي</th></tr></thead><tbody>${lines.map((x)=>`<tr><td>${esc(x.item_code)} - ${esc(x.item_name)}</td><td>${esc(x.qty)}</td><td>${money(x.sale_price)}</td><td>${money(x.tax_amount)}</td><td>${money(x.line_total)}</td></tr>`).join("")}</tbody></table><h3>الإجمالي النهائي: ${money(d.total_amount)} ${esc(appSettings.currency || "SAR")}</h3></div></body></html>`;
        const w = window.open("", "_blank");
        if (!w) return;
        w.document.open();
        w.document.write(html);
        w.document.close();
        w.focus();
        w.print();
      }

      function nextInvoiceNo(prefix, rows) {
        const p = String(prefix || "");
        let maxN = 0;
        for (const r of rows || []) {
          const no = String((r && r.invoice_no) || "");
          const m = no.match(/(\d+)\s*$/);
          if (!m) continue;
          const n = Number(m[1] || 0);
          if (Number.isFinite(n) && n > maxN) maxN = n;
        }
        return `${p}${String(maxN + 1).padStart(5, "0")}`;
      }
      function pickItemFromSearch() {
        const raw = (document.getElementById("itemSearchLine").value || "").trim();
        if (!raw) return null;
        const exact = items.find((x) => `${x.code} - ${x.name}` === raw);
        if (exact) return exact;
        const q = raw.toLowerCase();
        return items.find((x) => `${x.code} ${x.name}`.toLowerCase().includes(q)) || null;
      }
      async function loadItems() {
        const d = await apiGet("/api/trade/items");
        items = d.items || [];
        const sel = document.getElementById("item");
        sel.innerHTML = items.map((x) => `<option value="${esc(x.id)}">${esc(x.code)} - ${esc(x.name)} | متاح: ${esc(x.quantity)}</option>`).join("");
        const datalist = document.getElementById("itemOptions");
        datalist.innerHTML = items.map((x) => `<option value="${esc(x.code)} - ${esc(x.name)}"></option>`).join("");
        sel.addEventListener("change", () => {
          const it = items.find((x) => x.id === sel.value);
          if (it) document.getElementById("price").value = money(it.default_sale_price);
        });
        document.getElementById("itemSearchLine").oninput = () => {
          const it = pickItemFromSearch();
          if (!it) return;
          sel.value = it.id;
          document.getElementById("price").value = money(it.default_sale_price);
        };
      }

      async function loadSales() {
        const d = await apiGet("/api/trade/sales?limit=200");
        salesRows = d.items || [];
        if (!editingId && !document.getElementById("no").value) {
          document.getElementById("no").value = nextInvoiceNo("S-", salesRows);
        }
        renderSales();
      }

      function renderSales() {
        const q = (document.getElementById("searchInput").value || "").trim().toLowerCase();
        const rows = q ? salesRows.filter((x) => `${x.invoice_no} ${x.customer_name} ${x.sale_date} ${x.payment_type}`.toLowerCase().includes(q)) : salesRows;
        const host = document.getElementById("host");
        if (!rows.length) {
          host.innerHTML = '<div class="opacity-70">لا توجد مبيعات</div>';
          return;
        }
        host.innerHTML = `<table class="w-full min-w-[1000px] text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2 text-right">التاريخ</th><th class="px-2 py-2 text-right">الفاتورة</th><th class="px-2 py-2 text-right">العميل</th><th class="px-2 py-2 text-right">الدفع</th><th class="px-2 py-2 text-right">الإجمالي</th><th class="px-2 py-2 text-right">الإجراءات</th></tr></thead><tbody>${rows.map((x)=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.sale_date)}</td><td class="px-2 py-2">${esc(x.invoice_no)}</td><td class="px-2 py-2">${esc(x.customer_name)}</td><td class="px-2 py-2">${esc(paymentLabel(x.payment_type))}</td><td class="px-2 py-2 font-bold">${money(x.total_amount)}</td><td class="px-2 py-2"><div class="flex gap-1"><button class="rounded-lg border px-2 py-1 font-bold" data-edit="${x.id}">تعديل</button><button class="rounded-lg border px-2 py-1 font-bold" data-print="${x.id}">طباعة</button><button class="rounded-lg border px-2 py-1 font-bold text-red-600" data-del="${x.id}">حذف</button></div></td></tr>`).join("")}</tbody></table>`;
        host.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => editSale(b.getAttribute("data-edit"))));
        host.querySelectorAll("[data-print]").forEach((b) => b.addEventListener("click", () => printSale(b.getAttribute("data-print"))));
        host.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => removeSale(b.getAttribute("data-del"))));
      }

      async function editSale(id) {
        try {
          const d = await apiGet(`/api/trade/sales/${encodeURIComponent(id)}`);
          editingId = id;
          document.getElementById("formMode").textContent = `وضع: تعديل ${d.invoice_no || ""}`;
          document.getElementById("saveBtn").textContent = "حفظ التعديل";
          document.getElementById("no").value = d.invoice_no || "";
          document.getElementById("customer").value = d.customer_name || "";
          document.getElementById("date").value = d.sale_date || new Date().toISOString().slice(0, 10);
          document.getElementById("pay").value = d.payment_type || "cash";
          document.getElementById("discount").value = String(d.discount || 0);
          cart = (d.lines || []).map((x) => ({
            item_id: x.item_id,
            item_label: `${x.item_code || ""} - ${x.item_name || ""}`,
            qty: Number(x.qty || 0),
            sale_price: Number(x.sale_price || 0),
            tax_amount: Number(x.tax_amount || 0),
          }));
          renderCart();
          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (e) {
          showToast(e.message || "فشل تحميل الفاتورة", "#ef4444");
        }
      }

      async function printSale(id) {
        try {
          const d = await apiGet(`/api/trade/sales/${encodeURIComponent(id)}`);
          printInvoice(d);
          lastPrintedId = d.id;
        } catch (e) {
          showToast(e.message || "فشلت الطباعة", "#ef4444");
        }
      }

      async function removeSale(id) {
        if (!confirm("تأكيد حذف الفاتورة؟ سيتم إرجاع الكمية للمخزون.")) return;
        try {
          await apiDelete(`/api/trade/sales/${encodeURIComponent(id)}`);
          showToast("تم حذف الفاتورة ✔️", "#10b981");
          if (editingId === id) resetForm();
          await loadSales();
        } catch (e) {
          showToast(e.message || "فشل الحذف", "#ef4444");
        }
      }

      document.getElementById("addLineBtn").addEventListener("click", () => {
        const item = pickItemFromSearch() || items.find((x) => x.id === (document.getElementById("item").value || ""));
        if (!item) { showToast("اختر صنفًا أولًا", "#ef4444"); return; }
        const qty = Number(document.getElementById("qty").value || 0);
        const price = Number(document.getElementById("price").value || 0);
        const tax = Number(document.getElementById("tax").value || 0);
        if (qty <= 0) { showToast("الكمية يجب أن تكون أكبر من صفر", "#ef4444"); return; }
        cart.push({
          item_id: item.id,
          item_label: `${item.code} - ${item.name}`,
          qty,
          sale_price: price,
          tax_amount: tax,
        });
        document.getElementById("itemSearchLine").value = "";
        renderCart();
      });

      document.getElementById("saveBtn").addEventListener("click", async () => {
        try {
          if (!cart.length) { showToast("أضف بند واحد على الأقل", "#ef4444"); return; }
          const payload = payloadFromForm();
          let savedId = null;
          if (editingId) {
            const r = await apiPutJson(`/api/trade/sales/${encodeURIComponent(editingId)}`, payload);
            savedId = r.id;
            showToast("تم تعديل الفاتورة ✔️", "#10b981");
          } else {
            const r = await apiPostJson("/api/trade/sales", payload);
            savedId = r.id;
            showToast("تم حفظ الفاتورة ✔️", "#10b981");
          }
          if (savedId) {
            const details = await apiGet(`/api/trade/sales/${encodeURIComponent(savedId)}`);
            printInvoice(details);
            lastPrintedId = savedId;
          }
          resetForm();
          await loadItems();
          await loadSales();
        } catch (e) {
          showToast(e.message || "فشل الحفظ", "#ef4444");
        }
      });

      document.getElementById("printCurrentBtn").addEventListener("click", async () => {
        try {
          if (!lastPrintedId) { showToast("لا توجد فاتورة محفوظة للطباعة بعد", "#ef4444"); return; }
          const d = await apiGet(`/api/trade/sales/${encodeURIComponent(lastPrintedId)}`);
          printInvoice(d);
        } catch (e) {
          showToast(e.message || "فشلت الطباعة", "#ef4444");
        }
      });

      document.getElementById("resetBtn").addEventListener("click", resetForm);
      document.getElementById("searchInput").addEventListener("input", renderSales);
      document.getElementById("discount").addEventListener("input", renderCart);

      await Promise.all([loadItems(), loadSettings()]);
      resetForm();
      await loadSales();
    })();
  </script>
</body>
</html>
