<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المبيعات</title>
  <link rel="stylesheet" href="/static/tailwind.css?v=9" />
  <link rel="stylesheet" href="/static/dark.css?v=9" />
  <style>
    .pos-shell{border:1px solid #111827;border-radius:12px;background:#f8fafc;overflow:hidden}
    .titlebar{background:#0b1220;color:#e5e7eb;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
    .field{height:34px;border-radius:4px;border:1px solid #cbd5e1;padding:4px 8px;background:#fff}
    .lbl{font-size:12px;font-weight:700;color:#0f172a}
    .main-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:10px;padding:10px}
    .left-col{display:grid;grid-template-rows:auto 1fr auto;gap:8px}
    .head-grid{display:grid;grid-template-columns:1.1fr .9fr .9fr 1fr 1fr 1fr 1.2fr;gap:6px;align-items:end}
    .line-grid{display:grid;grid-template-columns:2.2fr .7fr .9fr .8fr auto;gap:6px;align-items:end}
    .cart-panel{border:1px solid #cbd5e1;border-radius:8px;background:#fff;min-height:320px;overflow:auto}
    .total-strip{display:grid;grid-template-columns:1.2fr .9fr auto auto auto;gap:6px;align-items:center}
    .cmd{height:34px;border:1px solid #64748b;border-radius:6px;padding:0 10px;font-weight:800;background:#fff}
    .cmd-primary{background:#16a34a;color:#fff;border-color:#16a34a}
    .cmd-accent{background:#2563eb;color:#fff;border-color:#2563eb}
    .side-pad{display:grid;gap:8px}
    .pad-box{border:1px solid #1f2937;border-radius:8px;background:#0f172a;padding:8px}
    .pad-title{color:#cbd5e1;font-size:12px;font-weight:700;margin-bottom:6px}
    .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .k{height:44px;border-radius:6px;border:1px solid #475569;background:linear-gradient(180deg,#f8fafc,#cbd5e1);font-weight:900}
    .k.wide{grid-column:span 2}
    .recent-panel{margin:0 10px 10px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;overflow:auto}
    @media (max-width:1200px){.main-grid{grid-template-columns:1fr}.head-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.line-grid{grid-template-columns:1fr 1fr}.total-strip{grid-template-columns:1fr}}
  </style>
</head>
<body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
  <div class="max-w-[1800px] mx-auto p-2">
    <div class="pos-shell">
      <div class="titlebar">
        <div class="font-extrabold">شاشة المبيعات - POS</div>
        <div class="flex items-center gap-3">
          <div id="formMode" class="text-xs opacity-80">وضع: إضافة جديدة</div>
          <div id="authArea"></div>
        </div>
      </div>

      <div class="main-grid">
        <div class="left-col">
          <section>
            <div class="head-grid">
              <div><div class="lbl">رقم الفاتورة</div><input id="no" class="field w-full" placeholder="14916" /></div>
              <div><div class="lbl">التاريخ</div><input id="date" type="date" class="field w-full" /></div>
              <div><div class="lbl">طريقة الدفع</div><select id="pay" class="field w-full"><option value="cash">نقد</option><option value="transfer">تحويل</option><option value="credit">آجل</option></select></div>
              <div><div class="lbl">العميل</div><input id="customer" class="field w-full" placeholder="عميل عام" /></div>
              <div><div class="lbl">الرقم الضريبي</div><input id="customerTaxNo" class="field w-full" placeholder="VAT/TIN" /></div>
              <div><div class="lbl">الهاتف</div><input id="customerPhone" class="field w-full" placeholder="05xxxxxxxx" /></div>
              <div><div class="lbl">العنوان</div><input id="customerAddress" class="field w-full" placeholder="عنوان العميل" /></div>
            </div>
            <div class="line-grid mt-2">
              <div>
                <div class="lbl">بحث الصنف</div>
                <input id="itemSearchLine" class="field w-full" list="itemOptions" placeholder="اكتب الكود أو الاسم" />
                <datalist id="itemOptions"></datalist>
                <select id="item" class="hidden"></select>
              </div>
              <div><div class="lbl">الكمية</div><input id="qty" type="number" step="0.01" value="1" class="field w-full" /></div>
              <div><div class="lbl">سعر البيع (شامل الضريبة)</div><input id="price" type="number" step="0.01" class="field w-full" /></div>
              <div><div class="lbl">ضريبة القيمة المضافة (%)</div><input id="tax" type="number" step="0.01" class="field w-full" /></div>
              <div class="pt-5"><button id="addLineBtn" class="cmd cmd-accent w-full">إضافة بند</button></div>
            </div>
          </section>

          <section class="cart-panel p-2">
            <div id="cartHost"></div>
          </section>

          <section>
            <div class="total-strip">
              <div id="totalsHost" class="field !h-auto py-2 font-bold text-sm"></div>
              <div><div class="lbl">الإجمالي النهائي (قابل للتعديل)</div><input id="finalTotal" type="number" step="0.01" class="field w-full" /></div>
              <button id="saveBtn" class="cmd cmd-primary">حفظ</button>
              <button id="printCurrentBtn" class="cmd">طباعة</button>
              <button id="resetBtn" class="cmd">جديد</button>
            </div>
          </section>
        </div>

        <aside class="side-pad">
          <div class="pad-box">
            <div class="pad-title">بحث بالفواتير</div>
            <input id="searchInput" class="field w-full mb-2" placeholder="بحث..." />
            <div class="lbl text-slate-200">خصم الفاتورة</div>
            <input id="discount" type="number" step="0.01" class="field w-full" />
          </div>
          <div class="pad-box">
            <div class="pad-title">أوامر سريعة</div>
            <div class="quick-actions">
              <button class="k" id="quickCash">دفع نقدي</button>
              <button class="k" id="quickTransfer">تحويل</button>
              <button class="k" id="quickCredit">آجل</button>
              <button class="k" id="quickAdd">إضافة بند</button>
            </div>
          </div>
          <div class="pad-box">
            <div class="pad-title">لوحة الأرقام</div>
            <div class="keypad">
              <button class="k" data-key="7">7</button><button class="k" data-key="8">8</button><button class="k" data-key="9">9</button>
              <button class="k" data-key="4">4</button><button class="k" data-key="5">5</button><button class="k" data-key="6">6</button>
              <button class="k" data-key="1">1</button><button class="k" data-key="2">2</button><button class="k" data-key="3">3</button>
              <button class="k wide" data-key="0">0</button><button class="k" data-key=".">.</button>
            </div>
          </div>
        </aside>
      </div>

      <section class="recent-panel p-2">
        <div id="host"></div>
      </section>
    </div>
  </div>
  <div id="toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-50 text-white text-sm font-bold px-4 py-2 rounded-xl shadow-lg"></div>

  <script src="/static/app.js?v=14"></script>
  <script>
    (async function () {
      await initAuthUI();

      function esc(s) { return String(s == null ? "" : s); }
      function money(n) { return Number(n || 0).toFixed(2); }
      function paymentLabel(v) { if (v === "cash") return "نقد"; if (v === "transfer") return "تحويل"; if (v === "credit") return "آجل"; return v || ""; }

      async function apiPutJson(url, body) {
        const csrf = localStorage.getItem("csrf_token") || "";
        const res = await fetch(url, {
          method: "PUT",
          credentials: "include",
          headers: { Accept: "application/json", "Content-Type": "application/json", "X-CSRF-Token": csrf },
          body: JSON.stringify(body || {}),
        });
        if (!res.ok) throw new Error(await readErrorMessage(res));
        return res.json();
      }

      let items = [];
      let salesRows = [];
      let cart = [];
      let editingId = null;
      let lastPrintedId = null;
      let appSettings = { shop_name: "كاشيركو", currency: "SAR", print_size: "A4", thermal_header: "شكراً لزيارتكم", tax_rate: 0 };
      async function loadSettings() {
        try {
          const d = await apiGet("/api/cashierko/settings");
          appSettings = { ...appSettings, ...(d.settings || {}) };
          if (!editingId) document.getElementById("tax").value = Number(appSettings.tax_rate || 0).toFixed(2);
        } catch (_) {}
      }

      function round2(n) { return Math.round((Number(n || 0) + Number.EPSILON) * 100) / 100; }
      function round4(n) { return Math.round((Number(n || 0) + Number.EPSILON) * 10000) / 10000; }
      function vatRate() { return Math.max(0, Number(document.getElementById("tax").value || 0)); }
      function lineFromGross(qty, grossUnit, ratePct) {
        const q = Math.max(0, Number(qty || 0));
        const g = Math.max(0, Number(grossUnit || 0));
        const r = Math.max(0, Number(ratePct || 0));
        const gross = round2(q * g);
        if (q <= 0) return { qty: 0, unit_gross: g, sale_price: 0, tax_amount: 0, gross: 0 };
        if (r <= 0) return { qty: q, unit_gross: g, sale_price: round4(g), tax_amount: 0, gross };
        const net = gross / (1 + r / 100);
        const tax = gross - net;
        return {
          qty: q,
          unit_gross: round4(g),
          sale_price: round4(net / q),
          tax_amount: round2(tax),
          gross: round2(gross),
        };
      }
      function recalcCartByRate() {
        const r = vatRate();
        cart = cart.map((x) => {
          const calc = lineFromGross(x.qty, x.unit_gross != null ? x.unit_gross : (Number(x.sale_price || 0) + (Number(x.tax_amount || 0) / Math.max(1, Number(x.qty || 1)))), r);
          return { ...x, qty: calc.qty, unit_gross: calc.unit_gross, sale_price: calc.sale_price, tax_amount: calc.tax_amount };
        });
      }
      function totals() {
        const discount = Number(document.getElementById("discount").value || 0);
        const gross = cart.reduce((s, x) => s + round2(Number(x.qty || 0) * Number(x.unit_gross != null ? x.unit_gross : x.sale_price || 0)), 0);
        return { gross, discount, net: Math.max(0, gross - discount) };
      }

      function renderCart() {
        const host = document.getElementById("cartHost");
        const t = totals();
        document.getElementById("totalsHost").innerHTML = `الإجمالي قبل الضريبة: ${money(cart.reduce((s,x)=>s + Number(x.qty||0)*Number(x.sale_price||0),0))} | الضريبة: ${money(cart.reduce((s,x)=>s + Number(x.tax_amount||0),0))} | الإجمالي: ${money(t.gross)} | الخصم: ${money(t.discount)} | الصافي: ${money(t.net)}`;
        const finalInput = document.getElementById("finalTotal");
        if (finalInput && document.activeElement !== finalInput) finalInput.value = money(t.net);
        host.innerHTML = cart.length
          ? `<div class="rounded-lg border overflow-auto"><table class="w-full min-w-[900px] text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2 text-right">الصنف</th><th class="px-2 py-2 text-right">الكمية</th><th class="px-2 py-2 text-right">السعر شامل الضريبة</th><th class="px-2 py-2 text-right">الضريبة</th><th class="px-2 py-2 text-right">الإجمالي</th><th class="px-2 py-2 text-right">حذف</th></tr></thead><tbody>${cart.map((x,i)=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.item_label)}</td><td class="px-2 py-2"><input class="field !h-8 w-24" type="number" step="0.01" data-qty="${i}" value="${esc(x.qty)}" /></td><td class="px-2 py-2"><input class="field !h-8 w-28" type="number" step="0.01" data-price="${i}" value="${esc(x.unit_gross != null ? x.unit_gross : x.sale_price)}" /></td><td class="px-2 py-2">${money(x.tax_amount)}</td><td class="px-2 py-2">${money(Number(x.qty)*Number(x.unit_gross != null ? x.unit_gross : x.sale_price || 0))}</td><td class="px-2 py-2"><button class="rounded-lg border px-2 py-1" data-del="${i}">✕</button></td></tr>`).join("")}</tbody></table></div>`
          : `<div class="opacity-70 text-sm">لا توجد بنود بعد</div>`;
        host.querySelectorAll("[data-qty]").forEach((inp) => inp.addEventListener("input", () => {
          const i = Number(inp.getAttribute("data-qty"));
          const row = cart[i];
          if (!row) return;
          const calc = lineFromGross(Number(inp.value || 0), row.unit_gross != null ? row.unit_gross : row.sale_price, vatRate());
          cart[i] = { ...row, qty: calc.qty, unit_gross: calc.unit_gross, sale_price: calc.sale_price, tax_amount: calc.tax_amount };
          renderCart();
        }));
        host.querySelectorAll("[data-price]").forEach((inp) => inp.addEventListener("input", () => {
          const i = Number(inp.getAttribute("data-price"));
          const row = cart[i];
          if (!row) return;
          const calc = lineFromGross(row.qty, Number(inp.value || 0), vatRate());
          cart[i] = { ...row, qty: calc.qty, unit_gross: calc.unit_gross, sale_price: calc.sale_price, tax_amount: calc.tax_amount };
          renderCart();
        }));
        host.querySelectorAll("[data-del]").forEach((btn) => btn.addEventListener("click", () => {
          cart.splice(Number(btn.getAttribute("data-del")), 1);
          renderCart();
        }));
      }

      function resetForm() {
        editingId = null;
        cart = [];
        document.getElementById("formMode").textContent = "وضع: إضافة جديدة";
        document.getElementById("saveBtn").textContent = "حفظ الفاتورة";
        document.getElementById("no").value = nextInvoiceNo("S-", salesRows);
        document.getElementById("customer").value = "";
        document.getElementById("customerTaxNo").value = "";
        document.getElementById("customerPhone").value = "";
        document.getElementById("customerAddress").value = "";
        document.getElementById("date").value = new Date().toISOString().slice(0, 10);
        document.getElementById("pay").value = "cash";
        document.getElementById("discount").value = "";
        document.getElementById("qty").value = "1";
        document.getElementById("tax").value = Number(appSettings.tax_rate || 0).toFixed(2);
        document.getElementById("finalTotal").value = "";
        document.getElementById("itemSearchLine").value = "";
        renderCart();
      }

      function payloadFromForm() {
        return {
          invoice_no: document.getElementById("no").value || `S-${Date.now()}`,
          customer_name: document.getElementById("customer").value || "عميل نقدي",
          customer_tax_no: document.getElementById("customerTaxNo").value || "",
          customer_phone: document.getElementById("customerPhone").value || "",
          customer_address: document.getElementById("customerAddress").value || "",
          sale_date: document.getElementById("date").value || new Date().toISOString().slice(0, 10),
          payment_type: document.getElementById("pay").value || "cash",
          discount: Number(document.getElementById("discount").value || 0),
          lines: cart.map((x) => ({
            item_id: x.item_id,
            qty: Number(x.qty),
            sale_price: Number(x.sale_price),
            tax_amount: Number(x.tax_amount),
          })),
        };
      }

      function printInvoice(d) {
        const lines = d.lines || [];
        const thermal = String(appSettings.print_size || "A4").toLowerCase() === "80mm";
        const html = `<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>فاتورة ${esc(d.invoice_no)}</title><style>body{font-family:Arial;padding:${thermal ? "6px" : "14px"};font-size:${thermal ? "12px" : "14px"}}.invoice{max-width:${thermal ? "280px" : "900px"};margin:0 auto}.invoice-head{text-align:center;margin-bottom:8px}.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;direction:ltr;margin:8px 0}.meta-box{border:1px solid #ddd;border-radius:8px;padding:${thermal ? "4px" : "8px"};direction:rtl;text-align:right}.meta-title{font-weight:700;margin-bottom:4px}.meta-line{margin:2px 0}table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border:1px solid #ddd;padding:${thermal ? "4px" : "6px"};text-align:right}.thanks{margin-top:10px;text-align:center;font-weight:700}.sub{font-size:${thermal ? "11px" : "13px"};opacity:.85}@media print{.invoice{max-width:100%}}</style></head><body><div class="invoice"><div class="invoice-head"><h2>${esc(appSettings.shop_name || "كاشيركو")}</h2><div class="sub">${esc(appSettings.thermal_header || "")}</div><div>رقم الفاتورة: <b>${esc(d.invoice_no)}</b> | التاريخ: <b>${esc(d.sale_date)}</b> | الدفع: <b>${esc(paymentLabel(d.payment_type))}</b></div></div><div class="meta-grid"><div class="meta-box"><div class="meta-title">بيانات الشركة</div><div class="meta-line">الاسم: <b>${esc(appSettings.shop_name || "كاشيركو")}</b></div><div class="meta-line">الرقم الضريبي: <b>${esc(appSettings.tax_number || "")}</b></div><div class="meta-line">السجل التجاري: <b>${esc(appSettings.commercial_register || "")}</b></div><div class="meta-line">العنوان: <b>${esc([appSettings.city || "", appSettings.country || "", appSettings.address || ""].filter(Boolean).join(" - "))}</b></div></div><div class="meta-box"><div class="meta-title">بيانات العميل</div><div class="meta-line">الاسم: <b>${esc(d.customer_name)}</b></div><div class="meta-line">الرقم الضريبي: <b>${esc(d.customer_tax_no || "")}</b></div><div class="meta-line">الهاتف: <b>${esc(d.customer_phone || "")}</b></div><div class="meta-line">العنوان: <b>${esc(d.customer_address || "")}</b></div></div></div><table><thead><tr><th>الصنف</th><th>الكمية</th><th>السعر قبل الضريبة</th><th>الضريبة</th><th>الإجمالي</th></tr></thead><tbody>${lines.map((x)=>`<tr><td>${esc(x.item_code)} - ${esc(x.item_name)}</td><td>${esc(x.qty)}</td><td>${money(x.sale_price)}</td><td>${money(x.tax_amount)}</td><td>${money(x.line_total)}</td></tr>`).join("")}</tbody></table><h3>الإجمالي النهائي: ${money(d.total_amount)} ${esc(appSettings.currency || "SAR")}</h3><div class="thanks">شكراً لزيارتكم لنا</div></div></body></html>`;
        const w = window.open("", "_blank");
        if (!w) return;
        w.document.open();
        w.document.write(html);
        w.document.close();
        w.focus();
        w.print();
      }

      function nextInvoiceNo(prefix, rows) {
        const p = String(prefix || "");
        let maxN = 0;
        for (const r of rows || []) {
          const no = String((r && r.invoice_no) || "");
          const m = no.match(/(\d+)\s*$/);
          if (!m) continue;
          const n = Number(m[1] || 0);
          if (Number.isFinite(n) && n > maxN) maxN = n;
        }
        return `${p}${String(maxN + 1).padStart(5, "0")}`;
      }
      function pickItemFromSearch() {
        const raw = (document.getElementById("itemSearchLine").value || "").trim();
        if (!raw) return null;
        const exact = items.find((x) => `${x.code} - ${x.name}` === raw);
        if (exact) return exact;
        const q = raw.toLowerCase();
        return items.find((x) => `${x.code} ${x.name}`.toLowerCase().includes(q)) || null;
      }
      async function loadItems() {
        const d = await apiGet("/api/trade/items");
        items = d.items || [];
        const sel = document.getElementById("item");
        sel.innerHTML = items.map((x) => `<option value="${esc(x.id)}">${esc(x.code)} - ${esc(x.name)} | متاح: ${esc(x.quantity)}</option>`).join("");
        const datalist = document.getElementById("itemOptions");
        datalist.innerHTML = items.map((x) => `<option value="${esc(x.code)} - ${esc(x.name)}"></option>`).join("");
        sel.addEventListener("change", () => {
          const it = items.find((x) => x.id === sel.value);
          if (it) document.getElementById("price").value = money(it.default_sale_price);
        });
        document.getElementById("itemSearchLine").oninput = () => {
          const it = pickItemFromSearch();
          if (!it) return;
          sel.value = it.id;
          document.getElementById("price").value = money(it.default_sale_price);
        };
      }

      async function loadSales() {
        const d = await apiGet("/api/trade/sales?limit=200");
        salesRows = d.items || [];
        if (!editingId) {
          document.getElementById("no").value = nextInvoiceNo("S-", salesRows);
        }
        renderSales();
      }

      function renderSales() {
        const q = (document.getElementById("searchInput").value || "").trim().toLowerCase();
        const rows = q ? salesRows.filter((x) => `${x.invoice_no} ${x.customer_name} ${x.sale_date} ${x.payment_type}`.toLowerCase().includes(q)) : salesRows;
        const host = document.getElementById("host");
        if (!rows.length) {
          host.innerHTML = '<div class="opacity-70">لا توجد مبيعات</div>';
          return;
        }
        host.innerHTML = `<table class="w-full min-w-[1000px] text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2 text-right">التاريخ</th><th class="px-2 py-2 text-right">الفاتورة</th><th class="px-2 py-2 text-right">العميل</th><th class="px-2 py-2 text-right">الدفع</th><th class="px-2 py-2 text-right">الإجمالي</th><th class="px-2 py-2 text-right">الإجراءات</th></tr></thead><tbody>${rows.map((x)=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.sale_date)}</td><td class="px-2 py-2">${esc(x.invoice_no)}</td><td class="px-2 py-2">${esc(x.customer_name)}</td><td class="px-2 py-2">${esc(paymentLabel(x.payment_type))}</td><td class="px-2 py-2 font-bold">${money(x.total_amount)}</td><td class="px-2 py-2"><div class="flex gap-1"><button class="rounded-lg border px-2 py-1 font-bold" data-edit="${x.id}">تعديل</button><button class="rounded-lg border px-2 py-1 font-bold" data-print="${x.id}">طباعة</button><button class="rounded-lg border px-2 py-1 font-bold text-red-600" data-del="${x.id}">حذف</button></div></td></tr>`).join("")}</tbody></table>`;
        host.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => editSale(b.getAttribute("data-edit"))));
        host.querySelectorAll("[data-print]").forEach((b) => b.addEventListener("click", () => printSale(b.getAttribute("data-print"))));
        host.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => removeSale(b.getAttribute("data-del"))));
      }

      async function editSale(id) {
        try {
          const d = await apiGet(`/api/trade/sales/${encodeURIComponent(id)}`);
          editingId = id;
          document.getElementById("formMode").textContent = `وضع: تعديل ${d.invoice_no || ""}`;
          document.getElementById("saveBtn").textContent = "حفظ التعديل";
          document.getElementById("no").value = d.invoice_no || "";
          document.getElementById("customer").value = d.customer_name || "";
          document.getElementById("customerTaxNo").value = d.customer_tax_no || "";
          document.getElementById("customerPhone").value = d.customer_phone || "";
          document.getElementById("customerAddress").value = d.customer_address || "";
          document.getElementById("date").value = d.sale_date || new Date().toISOString().slice(0, 10);
          document.getElementById("pay").value = d.payment_type || "cash";
          document.getElementById("discount").value = String(d.discount || 0);
          const netBase = (d.lines || []).reduce((s, x) => s + (Number(x.qty || 0) * Number(x.sale_price || 0)), 0);
          const taxBase = (d.lines || []).reduce((s, x) => s + Number(x.tax_amount || 0), 0);
          const guessedRate = netBase > 0 ? (taxBase / netBase) * 100 : Number(appSettings.tax_rate || 0);
          document.getElementById("tax").value = Number(guessedRate || 0).toFixed(2);
          cart = (d.lines || []).map((x) => ({
            item_id: x.item_id,
            item_label: `${x.item_code || ""} - ${x.item_name || ""}`,
            qty: Number(x.qty || 0),
            sale_price: Number(x.sale_price || 0),
            tax_amount: Number(x.tax_amount || 0),
            unit_gross: Number(x.qty || 0) > 0 ? round4((Number(x.qty || 0) * Number(x.sale_price || 0) + Number(x.tax_amount || 0)) / Number(x.qty || 0)) : Number(x.sale_price || 0),
          }));
          renderCart();
          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (e) {
          showToast(e.message || "فشل تحميل الفاتورة", "#ef4444");
        }
      }

      async function printSale(id) {
        try {
          const d = await apiGet(`/api/trade/sales/${encodeURIComponent(id)}`);
          printInvoice(d);
          lastPrintedId = d.id;
        } catch (e) {
          showToast(e.message || "فشلت الطباعة", "#ef4444");
        }
      }

      async function removeSale(id) {
        if (!id) { showToast("معرّف الفاتورة غير صالح", "#ef4444"); return; }
        if (!confirm("تأكيد حذف الفاتورة؟ سيتم إرجاع الكمية للمخزون.")) return;
        try {
          await apiDelete(`/api/trade/sales/${encodeURIComponent(id)}`);
          showToast("تم حذف الفاتورة ✔️", "#10b981");
          if (editingId === id) resetForm();
          await loadSales();
        } catch (e) {
          showToast(e.message || "فشل الحذف", "#ef4444");
        }
      }

      document.getElementById("addLineBtn").addEventListener("click", () => {
        const item = pickItemFromSearch() || items.find((x) => x.id === (document.getElementById("item").value || ""));
        if (!item) { showToast("اختر صنفًا أولًا", "#ef4444"); return; }
        const qty = Number(document.getElementById("qty").value || 0);
        const price = Number(document.getElementById("price").value || 0);
        const taxRate = vatRate();
        if (qty <= 0) { showToast("الكمية يجب أن تكون أكبر من صفر", "#ef4444"); return; }
        const calc = lineFromGross(qty, price, taxRate);
        cart.push({
          item_id: item.id,
          item_label: `${item.code} - ${item.name}`,
          qty: calc.qty,
          unit_gross: calc.unit_gross,
          sale_price: calc.sale_price,
          tax_amount: calc.tax_amount,
        });
        document.getElementById("itemSearchLine").value = "";
        renderCart();
      });

      document.getElementById("saveBtn").addEventListener("click", async () => {
        try {
          if (!cart.length) { showToast("أضف بند واحد على الأقل", "#ef4444"); return; }
          const payload = payloadFromForm();
          let savedId = null;
          if (editingId) {
            const r = await apiPutJson(`/api/trade/sales/${encodeURIComponent(editingId)}`, payload);
            savedId = r.id;
            showToast("تم تعديل الفاتورة ✔️", "#10b981");
          } else {
            const r = await apiPostJson("/api/trade/sales", payload);
            savedId = r.id;
            showToast("تم حفظ الفاتورة ✔️", "#10b981");
          }
          if (savedId) {
            const details = await apiGet(`/api/trade/sales/${encodeURIComponent(savedId)}`);
            printInvoice(details);
            lastPrintedId = savedId;
          }
          await loadSales();
          resetForm();
          await loadItems();
        } catch (e) {
          showToast(e.message || "فشل الحفظ", "#ef4444");
        }
      });

      document.getElementById("printCurrentBtn").addEventListener("click", async () => {
        try {
          if (!lastPrintedId) { showToast("لا توجد فاتورة محفوظة للطباعة بعد", "#ef4444"); return; }
          const d = await apiGet(`/api/trade/sales/${encodeURIComponent(lastPrintedId)}`);
          printInvoice(d);
        } catch (e) {
          showToast(e.message || "فشلت الطباعة", "#ef4444");
        }
      });

      document.getElementById("resetBtn").addEventListener("click", resetForm);
      document.getElementById("searchInput").addEventListener("input", renderSales);
      document.getElementById("discount").addEventListener("input", renderCart);
      document.getElementById("tax").addEventListener("input", () => { recalcCartByRate(); renderCart(); });
      document.getElementById("quickCash").addEventListener("click", () => { document.getElementById("pay").value = "cash"; });
      document.getElementById("quickTransfer").addEventListener("click", () => { document.getElementById("pay").value = "transfer"; });
      document.getElementById("quickCredit").addEventListener("click", () => { document.getElementById("pay").value = "credit"; });
      document.getElementById("quickAdd").addEventListener("click", () => { document.getElementById("addLineBtn").click(); });
      document.querySelectorAll("[data-key]").forEach((btn) => btn.addEventListener("click", () => {
        const el = document.activeElement;
        if (!el || !(el instanceof HTMLInputElement) || el.type === "date") return;
        if (el.readOnly || el.disabled) return;
        const k = btn.getAttribute("data-key") || "";
        el.value = `${el.value || ""}${k}`;
        el.dispatchEvent(new Event("input", { bubbles: true }));
      }));
      document.getElementById("finalTotal").addEventListener("input", () => {
        const t = totals();
        const wanted = Number(document.getElementById("finalTotal").value || 0);
        if (!Number.isFinite(wanted)) return;
        document.getElementById("discount").value = money(Math.max(0, t.gross - Math.max(0, wanted)));
        renderCart();
      });

      try {
        await Promise.all([loadItems(), loadSettings(), loadSales()]);
        resetForm();
      } catch (e) {
        showToast(e.message || "فشل تحميل شاشة المبيعات", "#ef4444");
      }
    })();
  </script>
</body>
</html>
