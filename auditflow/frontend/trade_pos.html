<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نقطة البيع | POS</title>
    <link rel="stylesheet" href="/static/tailwind.css?v=9" />
    <link rel="stylesheet" href="/static/dark.css?v=9" />
    <style>
      .touch-btn { min-height: 52px; }
      .pos-grid { display: grid; grid-template-columns: 360px 1fr 170px; gap: 10px; }
      .panel { border: 1px solid #e5e7eb; border-radius: 14px; background: #fff; }
      .panel-pad { padding: 10px; }
      .product-tile { min-height: 175px; }
      .side-btn { display: block; width: 100%; border: 1px solid #e5e7eb; border-radius: 10px; font-weight: 800; padding: 10px; text-align: right; }
      .quick-btn { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; font-weight: 800; }
      .soft { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px; }
      @media (max-width: 980px) { .pos-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="max-w-[1600px] mx-auto p-3 space-y-2">
      <div class="panel panel-pad flex items-center justify-between">
        <div>
          <div class="text-xs opacity-70">نقطة البيع</div>
          <h1 class="text-2xl font-extrabold">نقطة البيع المتقدمة (POS)</h1>
        </div>
        <div id="authArea"></div>
      </div>

      <div class="pos-grid">
        <!-- Cart / Invoice -->
        <section class="panel panel-pad space-y-2">
          <div class="font-extrabold">فاتورة بيع جديدة</div>
          <div class="grid grid-cols-2 gap-2">
            <input id="saleNo" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="رقم الفاتورة" />
            <input id="saleDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
            <input id="saleCustomer" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950 col-span-2" placeholder="عميل عام" />
            <input id="sellerName" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="اسم الكاشير" />
            <input id="branchName" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الفرع" />
          </div>
          <div id="cartHost" class="text-sm"></div>
          <div id="totalsHost" class="soft px-3 py-2 text-sm"></div>
          <div class="grid grid-cols-2 gap-2">
            <select id="paymentType" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950">
              <option value="cash">نقد</option>
              <option value="transfer">تحويل</option>
              <option value="credit">آجل</option>
            </select>
            <input id="salePaid" type="number" step="0.01" value="0" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="المدفوع" />
            <input id="saleDiscount" type="number" step="0.01" value="0" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950 col-span-2" placeholder="خصم الفاتورة" />
          </div>
          <button id="checkoutBtn" class="touch-btn w-full rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold px-4 py-3">إتمام البيع (F5)</button>
          <div class="grid grid-cols-2 gap-2">
            <button id="suspendBtn" class="quick-btn">حفظ مؤقت</button>
            <button id="loadSuspendedBtn" class="quick-btn">استكمال</button>
            <button id="clearCartBtn" class="quick-btn">تفريغ السلة</button>
            <button id="searchBtn" class="quick-btn">بحث</button>
          </div>
        </section>

        <!-- Products -->
        <section class="panel panel-pad space-y-2">
          <div class="grid grid-cols-1 md:grid-cols-6 gap-2">
            <input id="itemSearch" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950 md:col-span-3" placeholder="ابحث بالاسم أو الكود أو الماركة..." />
            <select id="itemSelect" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950 md:col-span-3"></select>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-5 gap-2">
            <div class="grid grid-cols-3 gap-1">
              <button id="qtyMinusBtn" class="quick-btn">-</button>
              <input id="lineQty" type="number" step="0.01" value="1" class="rounded-xl border px-3 py-2 text-center bg-white dark:bg-slate-950" />
              <button id="qtyPlusBtn" class="quick-btn">+</button>
            </div>
            <input id="linePrice" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="السعر" />
            <input id="lineTax" type="number" step="0.01" value="0" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الضريبة" />
            <button id="addToCartBtn" class="touch-btn rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-extrabold px-3 py-2 md:col-span-2">إضافة للسلة</button>
          </div>
          <div class="font-extrabold text-sm mt-1">المنتجات الأكثر استخدامًا</div>
          <div id="topItemsGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2"></div>
          <div class="font-extrabold text-sm mt-1">كل المنتجات</div>
          <div id="itemsGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2"></div>
        </section>

        <!-- Right actions -->
        <aside class="panel panel-pad space-y-2">
          <a class="side-btn bg-blue-600 text-white border-blue-600" href="/trade/sales">المبيعات</a>
          <a class="side-btn" href="/trade/reports">المرتجعات</a>
          <a class="side-btn" href="/trade/master-data">العملاء</a>
          <a class="side-btn" href="/trade/purchases">المشتريات</a>
          <a class="side-btn" href="/trade/inventory">المخزون</a>
          <a class="side-btn" href="/trade/reports">التقارير</a>
          <a class="side-btn" href="/trade/settings">الإعدادات</a>
          <a class="side-btn" href="/trade/sales">نظام الكاشير</a>
          <a class="side-btn" href="/trade">الرئيسية</a>
          <div class="soft p-2 text-xs mt-2">
            <div>F5: إتمام البيع</div>
            <div>F7: حفظ مؤقت</div>
            <div>F10: طباعة</div>
          </div>
        </aside>
      </div>

      <div class="panel panel-pad">
        <div class="grid grid-cols-2 md:grid-cols-6 gap-2">
          <button id="printInvoiceQuickBtn" class="quick-btn">طباعة F10</button>
          <button id="holdQuickBtn" class="quick-btn">حفظ مؤقت F7</button>
          <button id="discountQuickBtn" class="quick-btn">خصم</button>
          <button id="customerQuickBtn" class="quick-btn">عميل</button>
          <button id="searchQuickBtn" class="quick-btn">بحث</button>
          <button id="emptyQuickBtn" class="quick-btn">تفريغ</button>
        </div>
      </div>
    </div>
    <script src="/static/app.js?v=14"></script>
    <script>
      (function () {
        let items = [];
        let cart = [];
        let appSettings = { shop_name: "SmartPOS", currency: "SAR", print_size: "A4", thermal_header: "شكراً لزيارتكم" };
        let topItemIds = [];
        function esc(s) { return String(s == null ? "" : s); }
        function money(v) { return Number(v || 0).toFixed(2); }
        async function loadSettings() {
          try {
            const d = await apiGet("/api/cashierko/settings");
            appSettings = { ...appSettings, ...(d.settings || {}) };
          } catch (_) {}
        }
        async function loadItems(q = "") {
          const d = await apiGet(`/api/trade/items?q=${encodeURIComponent(q)}`);
          items = d.items || [];
          const sel = document.getElementById("itemSelect");
          sel.innerHTML = items.map((x) => `<option value="${esc(x.id)}">${esc(x.code)} - ${esc(x.name)} | متاح: ${esc(x.quantity)} | سعر: ${esc(x.default_sale_price)}</option>`).join("");
          const first = items[0];
          if (first) document.getElementById("linePrice").value = Number(first.default_sale_price || 0).toFixed(2);
          await loadTopItems();
          renderItemsGrid();
          renderTopItemsGrid();
        }
        async function loadTopItems() {
          try {
            const d = await apiGet("/api/trade/reports/top-items?limit=16");
            const best = d.best_selling || [];
            topItemIds = best.map((x) => String(x.item_id || "")).filter(Boolean);
          } catch (_) {
            topItemIds = [];
          }
          if (!topItemIds.length) {
            topItemIds = items.slice(0, 12).map((x) => String(x.id || ""));
          }
        }
        function makeProductTile(x) {
          return `<button class="product-tile rounded-xl border p-2 text-right bg-slate-50 dark:bg-slate-900" data-pick="${esc(x.id)}"><div class="font-extrabold text-sm">${esc(x.name)}</div><div class="text-xs opacity-70 mt-1">${esc(x.code)} | ${esc(x.brand||"")} ${esc(x.size||"")}</div><div class="text-xs mt-1">متاح: <b>${esc(x.quantity)}</b></div><div class="text-xs">سعر: <b>${esc(Number(x.default_sale_price||0).toFixed(2))}</b></div></button>`;
        }
        function renderItemsGrid() {
          const host = document.getElementById("itemsGrid");
          host.innerHTML = items.map((x) => makeProductTile(x)).join("");
          wirePickButtons(host);
        }
        function renderTopItemsGrid() {
          const host = document.getElementById("topItemsGrid");
          const tops = topItemIds.map((id) => items.find((x) => String(x.id) === String(id))).filter(Boolean);
          host.innerHTML = tops.length ? tops.map((x) => makeProductTile(x)).join("") : `<div class="opacity-70 col-span-full">لا توجد بيانات بيع كافية بعد</div>`;
          wirePickButtons(host);
        }
        function wirePickButtons(host) {
          host.querySelectorAll("[data-pick]").forEach((btn) => {
            btn.addEventListener("click", () => {
              const id = btn.getAttribute("data-pick");
              const sel = document.getElementById("itemSelect");
              sel.value = id;
              const it = currentItem();
              if (it) document.getElementById("linePrice").value = Number(it.default_sale_price || 0).toFixed(2);
            });
          });
        }
        function currentItem() {
          const id = document.getElementById("itemSelect").value || "";
          return items.find((x) => x.id === id) || null;
        }
        function renderCart() {
          const host = document.getElementById("cartHost");
          const discount = Number(document.getElementById("saleDiscount").value || 0);
          const paid = Number(document.getElementById("salePaid").value || 0);
          const sub = cart.reduce((s, x) => s + Number(x.qty) * Number(x.sale_price), 0);
          const tax = cart.reduce((s, x) => s + Number(x.tax_amount), 0);
          const gross = sub + tax;
          const net = Math.max(0, gross - discount);
          const due = Math.max(0, net - paid);
          document.getElementById("totalsHost").innerHTML = `<div class="grid gap-1"><div>الإجمالي قبل الخصم: <b>${money(gross)}</b></div><div>الخصم: <b>${money(discount)}</b></div><div>الإجمالي النهائي: <b>${money(net)}</b></div><div>المدفوع: <b>${money(paid)}</b></div><div>المتبقي: <b>${money(due)}</b></div></div>`;
          host.innerHTML = cart.length
            ? `<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">الصنف</th><th class="px-2 py-2">الكمية</th><th class="px-2 py-2">السعر</th><th class="px-2 py-2">الضريبة</th><th class="px-2 py-2">الإجمالي</th><th class="px-2 py-2">تحكم</th></tr></thead><tbody>${cart.map((x,i)=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.item_label)}</td><td class="px-2 py-2">${esc(x.qty)}</td><td class="px-2 py-2">${money(x.sale_price)}</td><td class="px-2 py-2">${money(x.tax_amount)}</td><td class="px-2 py-2">${money(Number(x.qty)*Number(x.sale_price)+Number(x.tax_amount))}</td><td class="px-2 py-2"><div class="flex gap-1"><button class="px-2 py-1 rounded border" data-minus="${i}">-</button><button class="px-2 py-1 rounded border" data-plus="${i}">+</button><button class="px-2 py-1 rounded border" data-del="${i}">✕</button></div></td></tr>`).join("")}</tbody></table></div>`
            : `<div class="opacity-70">السلة فارغة</div>`;
          host.querySelectorAll("[data-minus]").forEach((btn) => btn.addEventListener("click", () => { const i=Number(btn.getAttribute("data-minus")); cart[i].qty=Math.max(0.01, Number(cart[i].qty)-1); renderCart(); }));
          host.querySelectorAll("[data-plus]").forEach((btn) => btn.addEventListener("click", () => { const i=Number(btn.getAttribute("data-plus")); cart[i].qty=Number(cart[i].qty)+1; renderCart(); }));
          host.querySelectorAll("[data-del]").forEach((btn) => btn.addEventListener("click", () => { cart.splice(Number(btn.getAttribute("data-del")), 1); renderCart(); }));
        }
        function openPrintInvoice(data) {
          const lines = data.lines || [];
          const thermal = String(appSettings.print_size || "A4").toLowerCase() === "80mm";
          const widthStyle = thermal ? "max-width:280px" : "max-width:900px";
          const baseStyle = thermal ? "font-size:12px;padding:6px" : "font-size:14px;padding:16px";
          const html = `<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>فاتورة ${data.invoice_no}</title><style>body{font-family:Arial;${baseStyle}} .invoice{${widthStyle};margin:0 auto} table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:${thermal ? "4px" : "6px"};text-align:right}</style></head><body><div class="invoice">
            <h2>${esc(appSettings.shop_name || "SmartPOS")}</h2>
            <div>${esc(appSettings.thermal_header || "")}</div>
            <div>رقم الفاتورة: <b>${data.invoice_no}</b></div>
            <div>التاريخ: <b>${data.sale_date}</b></div>
            <div>العميل: <b>${data.customer_name}</b></div>
            <div>طريقة الدفع: <b>${data.payment_type}</b></div>
            <hr />
            <table><thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الضريبة</th><th>الإجمالي</th></tr></thead><tbody>
            ${lines.map((x)=>`<tr><td>${x.item_name}</td><td>${x.qty}</td><td>${Number(x.sale_price).toFixed(2)}</td><td>${Number(x.tax_amount).toFixed(2)}</td><td>${Number(x.line_total).toFixed(2)}</td></tr>`).join("")}
            </tbody></table>
            <h3>الإجمالي النهائي: ${Number(data.total_amount || 0).toFixed(2)} ${esc(appSettings.currency || "SAR")}</h3>
          </div></body></html>`;
          const w = window.open("", "_blank");
          if (!w) return;
          w.document.open();
          w.document.write(html);
          w.document.close();
          w.focus();
          w.print();
        }
        async function checkout() {
          if (!cart.length) { showToast("السلة فارغة", "#ef4444"); return; }
          const payload = {
            invoice_no: document.getElementById("saleNo").value || `POS-${Date.now()}`,
            customer_name: document.getElementById("saleCustomer").value || "عميل نقدي",
            sale_date: document.getElementById("saleDate").value || new Date().toISOString().slice(0,10),
            payment_type: document.getElementById("paymentType").value || "cash",
            discount: Number(document.getElementById("saleDiscount").value || 0),
            paid_amount: Number(document.getElementById("salePaid").value || 0),
            seller_name: document.getElementById("sellerName").value || "",
            branch_name: document.getElementById("branchName").value || "",
            lines: cart.map((x) => ({ item_id: x.item_id, qty: Number(x.qty), sale_price: Number(x.sale_price), tax_amount: Number(x.tax_amount) })),
          };
          const res = await apiPostJson("/api/trade/sales", payload);
          const details = await apiGet(`/api/trade/sales/${encodeURIComponent(res.id)}`);
          openPrintInvoice(details);
          cart = [];
          renderCart();
          showToast("تمت عملية البيع بنجاح ✔️", "#10b981");
          await loadItems(document.getElementById("itemSearch").value || "");
        }
        async function suspendCurrentInvoice() {
          if (!cart.length) { showToast("السلة فارغة", "#ef4444"); return; }
          const payload = {
            invoice_no: document.getElementById("saleNo").value || `HOLD-${Date.now()}`,
            customer_name: document.getElementById("saleCustomer").value || "عميل نقدي",
            sale_date: document.getElementById("saleDate").value || new Date().toISOString().slice(0,10),
            payment_type: document.getElementById("paymentType").value || "cash",
            discount: Number(document.getElementById("saleDiscount").value || 0),
            paid_amount: Number(document.getElementById("salePaid").value || 0),
            seller_name: document.getElementById("sellerName").value || "",
            branch_name: document.getElementById("branchName").value || "",
            lines: cart.map((x) => ({ item_id: x.item_id, qty: Number(x.qty), sale_price: Number(x.sale_price), tax_amount: Number(x.tax_amount) })),
          };
          await apiPostJson("/api/trade/sales/suspend", payload);
          cart = [];
          renderCart();
          showToast("تم تعليق الفاتورة ✔️", "#10b981");
        }
        async function loadSuspendedInvoice() {
          const d = await apiGet("/api/trade/sales/suspended?limit=50");
          const rows = d.items || [];
          if (!rows.length) { showToast("لا توجد فواتير معلقة", "#ef4444"); return; }
          const choices = rows.map((x, i) => `${i + 1}) ${x.invoice_no} - ${x.customer_name} - ${x.sale_date}`).join("\n");
          const pick = prompt(`اختر رقم الفاتورة المعلقة:\n${choices}`);
          const idx = Number(pick || 0) - 1;
          if (idx < 0 || idx >= rows.length) return;
          const selected = rows[idx];
          const res = await apiPostJson(`/api/trade/sales/suspended/${encodeURIComponent(selected.id)}/checkout`, {});
          const details = await apiGet(`/api/trade/sales/${encodeURIComponent(res.sale_id)}`);
          openPrintInvoice(details);
          showToast("تم استكمال الفاتورة المعلقة ✔️", "#10b981");
          await loadItems(document.getElementById("itemSearch").value || "");
        }
        document.getElementById("searchBtn").addEventListener("click", () => loadItems(document.getElementById("itemSearch").value || ""));
        document.getElementById("qtyMinusBtn").addEventListener("click", () => {
          const el = document.getElementById("lineQty");
          el.value = Math.max(0.01, Number(el.value || 0) - 1).toString();
        });
        document.getElementById("qtyPlusBtn").addEventListener("click", () => {
          const el = document.getElementById("lineQty");
          el.value = (Number(el.value || 0) + 1).toString();
        });
        document.querySelectorAll("[data-pay]").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.getElementById("paymentType").value = btn.getAttribute("data-pay") || "cash";
          });
        });
        document.getElementById("itemSelect").addEventListener("change", () => {
          const it = currentItem();
          if (it) document.getElementById("linePrice").value = Number(it.default_sale_price || 0).toFixed(2);
        });
        document.getElementById("addToCartBtn").addEventListener("click", () => {
          const it = currentItem();
          if (!it) return;
          const qty = Number(document.getElementById("lineQty").value || 0);
          const price = Number(document.getElementById("linePrice").value || 0);
          const tax = Number(document.getElementById("lineTax").value || 0);
          if (qty <= 0 || price < 0 || tax < 0) { showToast("تحقق من بيانات السطر", "#ef4444"); return; }
          cart.push({ item_id: it.id, item_label: `${it.code} - ${it.name}`, qty, sale_price: price, tax_amount: tax });
          renderCart();
        });
        document.getElementById("clearCartBtn").addEventListener("click", () => { cart = []; renderCart(); });
        document.getElementById("printInvoiceQuickBtn").addEventListener("click", async () => {
          try {
            const no = document.getElementById("saleNo").value || "";
            if (!no) { showToast("لا توجد فاتورة للطباعة", "#ef4444"); return; }
            const d = await apiGet("/api/trade/sales?limit=200");
            const rows = d.items || [];
            const hit = rows.find((x) => String(x.invoice_no || "") === String(no));
            if (!hit) { showToast("احفظ الفاتورة أولاً", "#ef4444"); return; }
            const details = await apiGet(`/api/trade/sales/${encodeURIComponent(hit.id)}`);
            openPrintInvoice(details);
          } catch (e) { showToast(e.message || "فشلت الطباعة", "#ef4444"); }
        });
        document.getElementById("holdQuickBtn").addEventListener("click", async () => {
          try { await suspendCurrentInvoice(); } catch (e) { showToast(e.message || "فشل الحفظ المؤقت", "#ef4444"); }
        });
        document.getElementById("discountQuickBtn").addEventListener("click", () => {
          const v = prompt("أدخل الخصم:", document.getElementById("saleDiscount").value || "0");
          if (v != null) { document.getElementById("saleDiscount").value = String(Number(v || 0)); renderCart(); }
        });
        document.getElementById("customerQuickBtn").addEventListener("click", () => {
          document.getElementById("saleCustomer").focus();
        });
        document.getElementById("searchQuickBtn").addEventListener("click", () => {
          document.getElementById("itemSearch").focus();
        });
        document.getElementById("emptyQuickBtn").addEventListener("click", () => {
          cart = []; renderCart();
        });
        document.getElementById("checkoutBtn").addEventListener("click", async () => {
          try { await checkout(); } catch (e) { showToast(e.message || "فشل إتمام البيع", "#ef4444"); }
        });
        document.getElementById("suspendBtn").addEventListener("click", async () => {
          try { await suspendCurrentInvoice(); } catch (e) { showToast(e.message || "فشل تعليق الفاتورة", "#ef4444"); }
        });
        document.getElementById("loadSuspendedBtn").addEventListener("click", async () => {
          try { await loadSuspendedInvoice(); } catch (e) { showToast(e.message || "فشل استكمال الفاتورة", "#ef4444"); }
        });
        document.getElementById("saleDiscount").addEventListener("input", renderCart);
        document.getElementById("salePaid").addEventListener("input", renderCart);
        window.addEventListener("keydown", async (ev) => {
          if (ev.key === "F5") {
            ev.preventDefault();
            try { await checkout(); } catch (e) { showToast(e.message || "فشل إتمام البيع", "#ef4444"); }
          } else if (ev.key === "F7") {
            ev.preventDefault();
            try { await suspendCurrentInvoice(); } catch (e) { showToast(e.message || "فشل تعليق الفاتورة", "#ef4444"); }
          } else if (ev.key === "F10") {
            ev.preventDefault();
            document.getElementById("printInvoiceQuickBtn").click();
          }
        });
        (async function init() {
          await initAuthUI();
          document.getElementById("saleDate").value = new Date().toISOString().slice(0,10);
          await loadSettings();
          await loadItems("");
          renderCart();
        })();
      })();
    </script>
  </body>
</html>
