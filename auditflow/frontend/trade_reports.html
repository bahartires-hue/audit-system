<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>التقارير</title><link rel="stylesheet" href="/static/tailwind.css?v=9" /><link rel="stylesheet" href="/static/dark.css?v=9" /><style>.layout{display:grid;grid-template-columns:240px 1fr;gap:14px}.side-link{display:block;border-radius:12px;padding:10px 12px;font-weight:800;border:1px solid #e5e7eb}.side-link.active{background:#f59e0b;color:#fff;border-color:#f59e0b}@media (max-width:1024px){.layout{grid-template-columns:1fr}}</style></head>
<body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-[1500px] mx-auto p-3"><div class="layout"><aside class="rounded-2xl border bg-white dark:bg-slate-950 p-3 h-fit"><div class="text-lg font-extrabold mb-3">SmartPOS</div><a class="side-link" href="/trade">الرئيسية</a><a class="side-link mt-2" href="/trade/sales">المبيعات</a><a class="side-link mt-2" href="/trade/purchases">المشتريات</a><a class="side-link mt-2" href="/trade/inventory">المخزون</a><a class="side-link active mt-2" href="/trade/reports">التقارير</a></aside><main class="space-y-3"><div class="rounded-2xl border bg-white dark:bg-slate-950 p-3 flex items-center justify-between"><h1 class="text-2xl font-extrabold">التقارير</h1><div id="authArea"></div></div>
<div id="movement" class="rounded-xl border p-4 bg-white dark:bg-slate-950">
<h1 class="text-xl font-extrabold mb-2">تقارير الربح وحركة الصنف</h1>
<div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2">
<input id="fromDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<input id="toDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<select id="itemId" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<button id="runBtn" class="rounded-xl border font-extrabold px-4 py-2">تشغيل</button>
</div>
<div id="profitHost" class="mb-3"></div><div id="movementHost"></div></div>

<div id="expenses-report" class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="text-lg font-extrabold">المصروفات والربح بعد المصروفات</h2>
<div class="flex gap-2">
<button id="printExpensesBtn" class="rounded-xl border font-extrabold px-4 py-2">طباعة المصروفات</button>
<button id="exportExpensesCsvBtn" class="rounded-xl border font-extrabold px-4 py-2">تصدير المصروفات Excel (CSV)</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-6 gap-2">
<input id="expenseDate" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<input id="expenseType" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="نوع المصروف (إيجار/رواتب...)" />
<input id="expenseAmount" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="المبلغ" />
<select id="expensePayType" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"><option value="cash">نقد</option><option value="network">شبكة</option><option value="transfer">تحويل</option><option value="credit">آجل</option></select>
<input id="expenseDesc" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الوصف" />
<button id="addExpenseBtn" class="rounded-xl border font-extrabold px-4 py-2">إضافة مصروف</button>
</div>
<div id="expenseSummaryHost"></div>
<div id="expensesHost"></div>
</div>

<div id="returns" class="rounded-xl border p-4 bg-white dark:bg-slate-950">
<h2 class="text-lg font-extrabold mb-2">المرتجعات (مبيعات / مشتريات)</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-2">
<select id="returnType" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"><option value="sale">مرتجع مبيعات</option><option value="purchase">مرتجع مشتريات</option></select>
<input id="returnSearch" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="اكتب رقم الفاتورة أو رقم/كود الصنف" />
<div id="returnMatchHost" class="rounded-xl border px-3 py-2 bg-slate-50 dark:bg-slate-900 text-sm">ابدأ بكتابة رقم الفاتورة أو رقم الصنف...</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-6 gap-2">
<select id="refInvoice" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<select id="returnItem" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<input id="returnQty" type="number" step="0.01" value="1" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="كمية المرتجع" />
<input id="returnReason" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="سبب المرتجع" />
<button id="saveReturnBtn" class="rounded-xl border font-extrabold px-4 py-2">حفظ المرتجع</button>
</div>
<div id="returnsHost" class="mt-3"></div>
</div>

<div id="customer-statement" class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="font-extrabold">كشف حساب عميل</h2>
<div class="grid grid-cols-1 md:grid-cols-4 gap-2">
<select id="customerSel" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<input id="cFrom" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<input id="cTo" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<button id="runCustomerStmt" class="rounded-xl border font-extrabold px-4 py-2">عرض كشف العميل</button>
</div>
<div id="customerStmtHost"></div>
</div>

<div id="tax-return" class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="font-extrabold">تقرير الإقرار الضريبي</h2>
<div class="flex gap-2">
<button id="runTaxBtn" class="rounded-xl border font-extrabold px-4 py-2">تشغيل الإقرار</button>
<button id="printTaxBtn" class="rounded-xl border font-extrabold px-4 py-2">طباعة</button>
<button id="exportTaxCsvBtn" class="rounded-xl border font-extrabold px-4 py-2">تصدير Excel (CSV)</button>
</div>
<div id="taxReturnHost"></div>
</div>

<div class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="font-extrabold">كشف حساب مورد</h2>
<div class="grid grid-cols-1 md:grid-cols-4 gap-2">
<select id="supplierSel" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<input id="sFrom" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<input id="sTo" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<button id="runSupplierStmt" class="rounded-xl border font-extrabold px-4 py-2">عرض كشف المورد</button>
</div>
<div id="supplierStmtHost"></div>
</div>
</main></div></div>
<script src="/static/app.js?v=14"></script>
<script>
(async function(){await initAuthUI();function esc(s){return String(s==null?"":s);} function money(n){return Number(n||0).toFixed(2);}
let items=[], sales=[], purchases=[];
let lastProfitTotals = { profit: 0 };
let lastTaxReport = null;
let lastExpenseRows = [];
function downloadCsv(filename, headers, rows){const escCsv=(v)=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;const lines=[headers.map(escCsv).join(",")].concat(rows.map((r)=>r.map(escCsv).join(",")));const blob=new Blob(["\uFEFF"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);}
function printElementHtml(title, html){const w=window.open("","_blank");if(!w)return;w.document.write(`<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>${esc(title)}</title><style>body{font-family:Arial;padding:16px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px;text-align:right}</style></head><body><h2>${esc(title)}</h2>${html}</body></html>`);w.document.close();w.focus();w.print();}
async function loadItems(){const d=await apiGet("/api/trade/items");items=d.items||[];document.getElementById("itemId").innerHTML=items.map(x=>`<option value="${esc(x.id)}">${esc(x.code)} - ${esc(x.name)}</option>`).join("");document.getElementById("returnItem").innerHTML=items.map(x=>`<option value="${esc(x.id)}">${esc(x.code)} - ${esc(x.name)}</option>`).join("");}
async function loadParties(){const c=await apiGet("/api/cashierko/customers");const s=await apiGet("/api/cashierko/suppliers");document.getElementById("customerSel").innerHTML=(c.items||[]).map(x=>`<option value="${esc(x.id)}">${esc(x.name)}</option>`).join("");document.getElementById("supplierSel").innerHTML=(s.items||[]).map(x=>`<option value="${esc(x.id)}">${esc(x.name)}</option>`).join("");}
async function loadReferences(){const s=await apiGet("/api/trade/sales?limit=200");const p=await apiGet("/api/trade/purchases?limit=200");sales=s.items||[];purchases=p.items||[];renderRefInvoices();}
async function loadTopItems(){const from=document.getElementById("fromDate").value||"";const to=document.getElementById("toDate").value||"";const d=await apiGet(`/api/trade/reports/top-items?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}&limit=5`);const best=d.best_selling||[];const worst=d.worst_selling||[];const host=document.getElementById("profitHost");host.insertAdjacentHTML("beforeend",`<div class="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2"><div class="rounded-xl border p-2"><div class="font-extrabold mb-1">أفضل الأصناف مبيعًا</div>${best.map(x=>`<div class="text-sm">${esc(x.item)} - كمية ${esc(x.qty)} - ربح ${money(x.profit)}</div>`).join("")||'<div class="opacity-70 text-sm">لا بيانات</div>'}</div><div class="rounded-xl border p-2"><div class="font-extrabold mb-1">أقل الأصناف مبيعًا</div>${worst.map(x=>`<div class="text-sm">${esc(x.item)} - كمية ${esc(x.qty)} - ربح ${money(x.profit)}</div>`).join("")||'<div class="opacity-70 text-sm">لا بيانات</div>'}</div></div>`);}
async function loadExpenses(){const from=document.getElementById("fromDate").value||"";const to=document.getElementById("toDate").value||"";const d=await apiGet(`/api/cashierko/expenses?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}&limit=300`);const rows=d.items||[];lastExpenseRows=rows;const total=Number((d.totals||{}).amount||0);const net=Number(lastProfitTotals.profit||0)-total;document.getElementById("expenseSummaryHost").innerHTML=`<div class="grid grid-cols-1 md:grid-cols-3 gap-2"><div class="rounded-xl border px-3 py-2">إجمالي المصروفات: <b>${money(total)}</b></div><div class="rounded-xl border px-3 py-2">الربح قبل المصروفات: <b>${money(lastProfitTotals.profit||0)}</b></div><div class="rounded-xl border px-3 py-2">الربح بعد المصروفات: <b>${money(net)}</b></div></div>`;document.getElementById("expensesHost").innerHTML=rows.length?`<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">التاريخ</th><th class="px-2 py-2">النوع</th><th class="px-2 py-2">المبلغ</th><th class="px-2 py-2">طريقة الدفع</th><th class="px-2 py-2">الوصف</th><th class="px-2 py-2">حذف</th></tr></thead><tbody>${rows.map(x=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.expense_date)}</td><td class="px-2 py-2">${esc(x.expense_type)}</td><td class="px-2 py-2">${money(x.amount)}</td><td class="px-2 py-2">${esc(x.payment_type)}</td><td class="px-2 py-2">${esc(x.description||"")}</td><td class="px-2 py-2"><button class="rounded border px-2 py-1 text-red-600" data-del-exp="${esc(x.id)}">حذف</button></td></tr>`).join("")}</tbody></table></div>`:`<div class="opacity-70">لا توجد مصروفات</div>`;document.querySelectorAll("[data-del-exp]").forEach((b)=>b.addEventListener("click",async()=>{if(!confirm("تأكيد حذف المصروف؟"))return;try{await apiDelete(`/api/cashierko/expenses/${encodeURIComponent(b.getAttribute("data-del-exp"))}`);showToast("تم حذف المصروف ✔️","#10b981");await loadExpenses();}catch(e){showToast(e.message||"فشل حذف المصروف","#ef4444");}}));}
function renderStatement(hostId, title, opening, closing, rows){document.getElementById(hostId).innerHTML=`<div class="mb-2">${title} | رصيد أول: <b>${money(opening)}</b> | رصيد آخر: <b>${money(closing)}</b></div>${rows&&rows.length?`<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">التاريخ</th><th class="px-2 py-2">الفاتورة</th><th class="px-2 py-2">البيان</th><th class="px-2 py-2">مدين</th><th class="px-2 py-2">دائن</th><th class="px-2 py-2">الأثر</th></tr></thead><tbody>${rows.map(x=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.date)}</td><td class="px-2 py-2">${esc(x.invoice_no)}</td><td class="px-2 py-2">${esc(x.description)}</td><td class="px-2 py-2">${money(x.debit)}</td><td class="px-2 py-2">${money(x.credit)}</td><td class="px-2 py-2">${money(x.balance_delta)}</td></tr>`).join("")}</tbody></table></div>`:`<div class="opacity-70">لا يوجد حركات</div>`}`;}
function renderRefInvoices(){const tp=document.getElementById("returnType").value||"sale";const rows=tp==="sale"?sales:purchases;document.getElementById("refInvoice").innerHTML=rows.map(x=>`<option value="${esc(x.id)}">${esc(x.invoice_no)} | ${esc(tp==="sale"?x.customer_name:x.supplier_name)} | ${esc(tp==="sale"?x.sale_date:x.purchase_date)}</option>`).join("");}
function renderTaxReturn(d){const o=d.output_vat||{};const i=d.input_vat||{};const n=d.net_vat||{};const c=d.company||{};document.getElementById("taxReturnHost").innerHTML=`<div class="mb-2 text-sm">المنشأة: <b>${esc(c.shop_name||"")}</b> | الرقم الضريبي: <b>${esc(c.tax_number||"")}</b> | الفترة: <b>${esc((d.period||{}).date_from||"")}</b> - <b>${esc((d.period||{}).date_to||"")}</b></div><div class="grid grid-cols-1 md:grid-cols-2 gap-2"><div class="rounded-lg border p-2"><div class="font-extrabold mb-1">ضريبة المبيعات (Output VAT)</div><div class="text-sm">المبيعات قبل الضريبة: ${money(o.sales_before_tax)}</div><div class="text-sm">ضريبة المبيعات: ${money(o.sales_tax)}</div><div class="text-sm">مرتجعات قبل الضريبة: ${money(o.returns_before_tax)}</div><div class="text-sm">ضريبة المرتجعات: ${money(o.returns_tax)}</div><div class="text-sm font-bold">صافي ضريبة المبيعات: ${money(o.net_sales_tax)}</div></div><div class="rounded-lg border p-2"><div class="font-extrabold mb-1">ضريبة المشتريات (Input VAT)</div><div class="text-sm">المشتريات قبل الضريبة: ${money(i.purchases_before_tax)}</div><div class="text-sm">ضريبة المشتريات: ${money(i.purchases_tax)}</div><div class="text-sm">مرتجعات قبل الضريبة: ${money(i.returns_before_tax)}</div><div class="text-sm">ضريبة المرتجعات: ${money(i.returns_tax)}</div><div class="text-sm font-bold">صافي ضريبة المشتريات: ${money(i.net_purchases_tax)}</div></div></div><div class="rounded-lg border p-2 mt-2 text-sm"><div>صافي الضريبة المستحقة: <b>${money(n.net_tax_due)}</b></div><div>${n.status==="payable"?"ضريبة مستحقة الدفع":"رصيد ضريبي لصالح المنشأة"} | مستحق: <b>${money(n.payable_amount||0)}</b> | رصيد: <b>${money(n.credit_amount||0)}</b></div></div>`;}
async function resolveReturnSearch(){try{const q=(document.getElementById("returnSearch").value||"").trim().toLowerCase();const tp=document.getElementById("returnType").value||"sale";const rows=tp==="sale"?sales:purchases;const host=document.getElementById("returnMatchHost");if(!q){host.textContent="ابدأ بكتابة رقم الفاتورة أو رقم الصنف...";return;}const inv=rows.find((x)=>String(x.invoice_no||"").toLowerCase().includes(q));const item=items.find((x)=>`${x.code} ${x.name}`.toLowerCase().includes(q));if(!inv&&!item){host.textContent="لا يوجد تطابق";return;}if(inv){document.getElementById("refInvoice").value=inv.id||"";}if(item){document.getElementById("returnItem").value=item.id||"";}let lineTxt="";if(inv){const detail=await apiGet(tp==="sale"?`/api/trade/sales/${encodeURIComponent(inv.id)}`:`/api/trade/purchases/${encodeURIComponent(inv.id)}`);const lines=detail.lines||[];let matched=item?lines.find((ln)=>String(ln.item_code||"").toLowerCase().includes(q)||String(ln.item_name||"").toLowerCase().includes(q)):null;if(!matched&&lines.length)matched=lines[0];if(matched){const matchedItem=items.find((it)=>it.id===matched.item_id)||item;if(matchedItem)document.getElementById("returnItem").value=matchedItem.id||"";document.getElementById("returnQty").value=String(matched.qty||1);lineTxt=` | الصنف: ${esc(matched.item_code||"")} - ${esc(matched.item_name||"")} | الكمية المتاحة للمرتجع: ${esc(matched.qty||0)}`;}}host.innerHTML=`تم العثور على: <b>${esc(inv?inv.invoice_no:"")}</b>${lineTxt}`;}catch(_){document.getElementById("returnMatchHost").textContent="تعذر قراءة بيانات المطابقة";}}
async function run(){const from=document.getElementById("fromDate").value||"";const to=document.getElementById("toDate").value||"";const itemId=document.getElementById("itemId").value||"";const p=await apiGet(`/api/trade/reports/profit?date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`);const t=p.totals||{};lastProfitTotals=t||{profit:0};document.getElementById("profitHost").innerHTML=`<div class="grid grid-cols-1 md:grid-cols-6 gap-2"><div class="rounded-xl border px-3 py-2">صافي المبيعات: <b>${money(t.net_sales||0)}</b></div><div class="rounded-xl border px-3 py-2">تكلفة المبيعات: <b>${money(t.cost_total||0)}</b></div><div class="rounded-xl border px-3 py-2">مرتجع المبيعات: <b>${money(t.returned_sales||0)}</b></div><div class="rounded-xl border px-3 py-2">تكلفة المرتجع: <b>${money(t.returned_cost||0)}</b></div><div class="rounded-xl border px-3 py-2">الربح: <b>${money(t.profit||0)}</b></div><div class="rounded-xl border px-3 py-2">هامش الربح%: <b>${esc(t.profit_margin_pct||0)}</b></div></div>`;await Promise.all([loadTopItems(),loadExpenses()]);if(!itemId)return;const m=await apiGet(`/api/trade/reports/item-movement?item_id=${encodeURIComponent(itemId)}&date_from=${encodeURIComponent(from)}&date_to=${encodeURIComponent(to)}`);const rows=m.items||[];const s=m.summary||{};document.getElementById("movementHost").innerHTML=`<div class="mb-2">رصيد أول: <b>${esc(s.opening_qty||0)}</b> | وارد: <b>${esc(s.qty_in||0)}</b> | صادر: <b>${esc(s.qty_out||0)}</b> | رصيد: <b>${esc(s.balance_qty||0)}</b></div>${rows.length?`<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">التاريخ</th><th class="px-2 py-2">النوع</th><th class="px-2 py-2">وارد</th><th class="px-2 py-2">صادر</th><th class="px-2 py-2">الرصيد بعد الحركة</th><th class="px-2 py-2">التكلفة</th></tr></thead><tbody>${rows.map(x=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.date)}</td><td class="px-2 py-2">${esc(x.movement_type)}</td><td class="px-2 py-2">${esc(x.qty_in)}</td><td class="px-2 py-2">${esc(x.qty_out)}</td><td class="px-2 py-2">${esc(x.balance_after)}</td><td class="px-2 py-2">${esc(x.unit_cost)}</td></tr>`).join("")}</tbody></table></div>`:`<div class="opacity-70">لا توجد حركة للصنف</div>`}`;}
async function loadReturns(){const d=await apiGet("/api/trade/returns?limit=200");const rows=d.items||[];document.getElementById("returnsHost").innerHTML=rows.length?`<div class="grid gap-1">${rows.map(x=>`<div class="rounded-lg border px-3 py-2">${esc(x.return_date)} | ${esc(x.return_type)} | ${esc(x.invoice_no)} | ${esc(x.customer_name||x.supplier_name)} | ${money(x.total_amount)} | ${esc(x.reason)}</div>`).join("")}</div>`:`<div class="opacity-70">لا توجد مرتجعات</div>`;}
document.getElementById("returnType").addEventListener("change",renderRefInvoices);
document.getElementById("returnType").addEventListener("change",resolveReturnSearch);
document.getElementById("returnSearch").addEventListener("input",resolveReturnSearch);
document.getElementById("saveReturnBtn").addEventListener("click",async()=>{try{const tp=document.getElementById("returnType").value||"sale";const endpoint=tp==="sale"?"/api/trade/returns/sale":"/api/trade/returns/purchase";const payload={[tp==="sale"?"sale_id":"purchase_id"]:document.getElementById("refInvoice").value||"",return_date:new Date().toISOString().slice(0,10),reason:document.getElementById("returnReason").value||"",lines:[{item_id:document.getElementById("returnItem").value||"",qty:Number(document.getElementById("returnQty").value||0),unit_price:0,unit_cost:0}]};await apiPostJson(endpoint,payload);showToast("تم حفظ المرتجع ✔️","#10b981");await Promise.all([loadReturns(),run()]);}catch(e){showToast(e.message||"فشل حفظ المرتجع","#ef4444");}});
document.getElementById("runCustomerStmt").addEventListener("click",async()=>{try{const id=document.getElementById("customerSel").value||"";const f=document.getElementById("cFrom").value||"";const t=document.getElementById("cTo").value||"";if(!id){showToast("اختر العميل أولاً","#ef4444");return;}const d=await apiGet(`/api/cashierko/customers/${encodeURIComponent(id)}/statement?date_from=${encodeURIComponent(f)}&date_to=${encodeURIComponent(t)}`);renderStatement("customerStmtHost",`كشف العميل: ${d.customer.name}`,d.opening_balance,d.closing_balance,d.items||[]);}catch(e){showToast(e.message||"فشل كشف العميل","#ef4444");}});
document.getElementById("runSupplierStmt").addEventListener("click",async()=>{try{const id=document.getElementById("supplierSel").value||"";const f=document.getElementById("sFrom").value||"";const t=document.getElementById("sTo").value||"";if(!id){showToast("اختر المورد أولاً","#ef4444");return;}const d=await apiGet(`/api/cashierko/suppliers/${encodeURIComponent(id)}/statement?date_from=${encodeURIComponent(f)}&date_to=${encodeURIComponent(t)}`);renderStatement("supplierStmtHost",`كشف المورد: ${d.supplier.name}`,d.opening_balance,d.closing_balance,d.items||[]);}catch(e){showToast(e.message||"فشل كشف المورد","#ef4444");}});
document.getElementById("runTaxBtn").addEventListener("click",async()=>{try{const f=document.getElementById("fromDate").value||"";const t=document.getElementById("toDate").value||"";const d=await apiGet(`/api/trade/reports/tax-return?date_from=${encodeURIComponent(f)}&date_to=${encodeURIComponent(t)}`);lastTaxReport=d;renderTaxReturn(d);}catch(e){showToast(e.message||"فشل تشغيل الإقرار الضريبي","#ef4444");}});
document.getElementById("printTaxBtn").addEventListener("click",()=>{const html=document.getElementById("taxReturnHost").innerHTML||"";if(!html){showToast("شغل الإقرار أولاً","#ef4444");return;}printElementHtml("تقرير الإقرار الضريبي",html);});
document.getElementById("exportTaxCsvBtn").addEventListener("click",()=>{const d=lastTaxReport;if(!d){showToast("شغل الإقرار أولاً","#ef4444");return;}const o=d.output_vat||{};const i=d.input_vat||{};const n=d.net_vat||{};downloadCsv("tax-return-report.csv",["البند","القيمة"],[["المبيعات قبل الضريبة",o.sales_before_tax],["ضريبة المبيعات",o.sales_tax],["مرتجعات المبيعات قبل الضريبة",o.returns_before_tax],["ضريبة مرتجعات المبيعات",o.returns_tax],["صافي ضريبة المبيعات",o.net_sales_tax],["المشتريات قبل الضريبة",i.purchases_before_tax],["ضريبة المشتريات",i.purchases_tax],["مرتجعات المشتريات قبل الضريبة",i.returns_before_tax],["ضريبة مرتجعات المشتريات",i.returns_tax],["صافي ضريبة المشتريات",i.net_purchases_tax],["صافي الضريبة المستحقة",n.net_tax_due],["المبلغ المستحق",n.payable_amount||0],["الرصيد الضريبي",n.credit_amount||0]]);});
document.getElementById("addExpenseBtn").addEventListener("click",async()=>{try{const payload={expense_date:document.getElementById("expenseDate").value||new Date().toISOString().slice(0,10),expense_type:document.getElementById("expenseType").value||"أخرى",amount:Number(document.getElementById("expenseAmount").value||0),payment_type:document.getElementById("expensePayType").value||"cash",description:document.getElementById("expenseDesc").value||"",notes:""};if(payload.amount<=0){showToast("أدخل مبلغ المصروف","#ef4444");return;}await apiPostJson("/api/cashierko/expenses",payload);showToast("تمت إضافة المصروف ✔️","#10b981");document.getElementById("expenseAmount").value="";document.getElementById("expenseDesc").value="";await loadExpenses();}catch(e){showToast(e.message||"فشل إضافة المصروف","#ef4444");}});
document.getElementById("printExpensesBtn").addEventListener("click",()=>{const html=document.getElementById("expensesHost").innerHTML||"";if(!html||html.includes("لا توجد مصروفات")){showToast("لا توجد مصروفات للطباعة","#ef4444");return;}printElementHtml("تقرير المصروفات",html);});
document.getElementById("exportExpensesCsvBtn").addEventListener("click",()=>{if(!lastExpenseRows.length){showToast("لا توجد مصروفات للتصدير","#ef4444");return;}downloadCsv("expenses-report.csv",["التاريخ","النوع","المبلغ","طريقة الدفع","الوصف"],lastExpenseRows.map((x)=>[x.expense_date,x.expense_type,x.amount,x.payment_type,x.description||""]));});
const now=new Date().toISOString().slice(0,10);document.getElementById("toDate").value=now;document.getElementById("fromDate").value=`${new Date().getFullYear()}-01-01`;document.getElementById("expenseDate").value=now;document.getElementById("cTo").value=now;document.getElementById("sTo").value=now;document.getElementById("cFrom").value=`${new Date().getFullYear()}-01-01`;document.getElementById("sFrom").value=`${new Date().getFullYear()}-01-01`;document.getElementById("runBtn").addEventListener("click",run);await Promise.all([loadItems(),loadReferences(),loadReturns(),loadParties()]);await run();})();
</script></body></html>
