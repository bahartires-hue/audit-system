<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>المخزون</title><link rel="stylesheet" href="/static/tailwind.css?v=9" /><link rel="stylesheet" href="/static/dark.css?v=9" /></head>
<body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-7xl mx-auto p-4 space-y-4">
<div class="flex flex-wrap gap-2"><a class="px-3 py-2 rounded-xl border font-bold" href="/trade">الرئيسية</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/items">الأصناف</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/purchases">المشتريات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/sales">المبيعات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/inventory">المخزون</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/reports">التقارير</a></div>
<div class="rounded-xl border p-4 bg-white dark:bg-slate-950">
<div class="flex items-center justify-between mb-2"><h1 class="text-xl font-extrabold">المخزون الحالي</h1><button id="refreshBtn" class="rounded-xl border font-extrabold px-4 py-2">تحديث</button></div>
<div id="host"></div></div></div>
<script src="/static/app.js?v=14"></script>
<script>
(async function(){await initAuthUI();function esc(s){return String(s==null?"":s);}
async function load(){const d=await apiGet("/trade/inventory");const rows=d.items||[];document.getElementById("host").innerHTML=rows.length?`<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">الكود</th><th class="px-2 py-2">الصنف</th><th class="px-2 py-2">الكمية</th><th class="px-2 py-2">تكلفة الوحدة</th><th class="px-2 py-2">سعر البيع</th><th class="px-2 py-2">قيمة المخزون</th></tr></thead><tbody>${rows.map(x=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.code)}</td><td class="px-2 py-2">${esc(x.name)}</td><td class="px-2 py-2">${esc(x.quantity)}</td><td class="px-2 py-2">${esc(x.cost_price)}</td><td class="px-2 py-2">${esc(x.sale_price)}</td><td class="px-2 py-2">${esc(x.stock_value)}</td></tr>`).join("")}</tbody></table></div>`:`<div class="opacity-70">لا يوجد مخزون</div>`;}
document.getElementById("refreshBtn").addEventListener("click",load);await load();})();
</script></body></html>
