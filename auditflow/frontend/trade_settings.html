<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>إعدادات SmartPOS</title><link rel="stylesheet" href="/static/tailwind.css?v=9" /><link rel="stylesheet" href="/static/dark.css?v=9" /></head>
<body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-6xl mx-auto p-4 space-y-4">
<div class="flex items-center justify-between"><h1 class="text-2xl font-extrabold">إعدادات النظام</h1><div id="authArea"></div></div>
<div class="flex flex-wrap gap-2"><a class="px-3 py-2 rounded-xl border font-bold" href="/trade">الرئيسية</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/sales">المبيعات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/purchases">المشتريات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/inventory">المخزون</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/items">الأصناف</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/master-data">البيانات الأساسية</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/reports">التقارير</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/users">المستخدمين</a><a class="px-3 py-2 rounded-xl border font-bold bg-blue-600 text-white border-blue-600" href="/trade/settings">الإعدادات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/sales">نظام الكاشير</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/transfers">التحويلات</a></div>
<section class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="font-extrabold">بيانات المحل والفاتورة</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-2">
<input id="shopName" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="اسم المحل" />
<input id="shopPhone" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الجوال" />
<input id="taxNumber" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الرقم الضريبي" />
<input id="commercialRegister" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="رقم السجل التجاري" />
<input id="postalCode" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الرمز البريدي" />
<input id="country" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الدولة" />
<input id="city" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="المدينة" />
<input id="shopAddress" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950 md:col-span-2" placeholder="العنوان" />
<input id="currency" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="العملة" />
<input id="taxRate" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="نسبة الضريبة" />
<input id="invoicePrefix" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="بادئة الفاتورة" />
<select id="printSize" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"><option value="A4">A4</option><option value="80mm">حراري 80mm</option></select>
<input id="thermalHeader" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950 md:col-span-2" placeholder="ترويسة الطابعة الحرارية" />
</div>
<button id="saveSettingsBtn" class="rounded-xl border font-extrabold px-4 py-2">حفظ الإعدادات</button>
</section>
</div>
<script src="/static/app.js?v=14"></script>
<script>
(async function(){await initAuthUI();
async function loadSettings(){const d=await apiGet("/api/cashierko/settings");const s=d.settings||{};document.getElementById("shopName").value=s.shop_name||"";document.getElementById("shopPhone").value=s.phone||"";document.getElementById("shopAddress").value=s.address||"";document.getElementById("taxNumber").value=s.tax_number||"";document.getElementById("commercialRegister").value=s.commercial_register||"";document.getElementById("postalCode").value=s.postal_code||"";document.getElementById("country").value=s.country||"";document.getElementById("city").value=s.city||"";document.getElementById("currency").value=s.currency||"SAR";document.getElementById("taxRate").value=s.tax_rate||0;document.getElementById("invoicePrefix").value=s.invoice_prefix||"INV";document.getElementById("printSize").value=s.print_size||"A4";document.getElementById("thermalHeader").value=s.thermal_header||"";}
document.getElementById("saveSettingsBtn").addEventListener("click",async()=>{try{await apiPatchJson("/api/cashierko/settings",{shop_name:document.getElementById("shopName").value||"",phone:document.getElementById("shopPhone").value||"",address:document.getElementById("shopAddress").value||"",tax_number:document.getElementById("taxNumber").value||"",commercial_register:document.getElementById("commercialRegister").value||"",postal_code:document.getElementById("postalCode").value||"",country:document.getElementById("country").value||"",city:document.getElementById("city").value||"",currency:document.getElementById("currency").value||"SAR",tax_rate:Number(document.getElementById("taxRate").value||0),invoice_prefix:document.getElementById("invoicePrefix").value||"INV",print_size:document.getElementById("printSize").value||"A4",thermal_header:document.getElementById("thermalHeader").value||""});showToast("تم حفظ الإعدادات ✔️","#10b981");}catch(e){showToast(e.message||"فشل حفظ الإعدادات","#ef4444");}});
await loadSettings();})();
</script>
</body></html>
