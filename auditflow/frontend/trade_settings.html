<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>إعدادات كاشيركو</title><link rel="stylesheet" href="/static/tailwind.css?v=9" /><link rel="stylesheet" href="/static/dark.css?v=9" /></head>
<body class="bg-slate-100 dark:bg-[#050508] text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-6xl mx-auto p-4 space-y-4">
<div class="flex items-center justify-between"><h1 class="text-2xl font-extrabold">إعدادات النظام</h1><div id="authArea"></div></div>
<div class="flex flex-wrap gap-2"><a class="px-3 py-2 rounded-xl border font-bold" href="/trade">الرئيسية</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/master-data">البيانات الأساسية</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/transfers">التحويلات</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/users">المستخدمين</a><a class="px-3 py-2 rounded-xl border font-bold" href="/trade/settings">الإعدادات</a></div>
<section class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="font-extrabold">بيانات المحل والفاتورة</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-2">
<input id="shopName" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="اسم المحل" />
<input id="shopPhone" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="الجوال" />
<input id="shopAddress" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="العنوان" />
<input id="currency" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="العملة" />
<input id="taxRate" type="number" step="0.01" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="نسبة الضريبة" />
<input id="invoicePrefix" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" placeholder="بادئة الفاتورة" />
<select id="printSize" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"><option value="A4">A4</option><option value="80mm">حراري 80mm</option></select>
<input id="thermalHeader" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950 md:col-span-2" placeholder="ترويسة الطابعة الحرارية" />
</div>
<button id="saveSettingsBtn" class="rounded-xl border font-extrabold px-4 py-2">حفظ الإعدادات</button>
</section>

<section class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="font-extrabold">كشف حساب عميل</h2>
<div class="grid grid-cols-1 md:grid-cols-4 gap-2">
<select id="customerSel" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<input id="cFrom" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<input id="cTo" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<button id="runCustomerStmt" class="rounded-xl border font-extrabold px-4 py-2">عرض كشف العميل</button>
</div>
<div id="customerStmtHost"></div>
</section>

<section class="rounded-xl border p-4 bg-white dark:bg-slate-950 space-y-2">
<h2 class="font-extrabold">كشف حساب مورد</h2>
<div class="grid grid-cols-1 md:grid-cols-4 gap-2">
<select id="supplierSel" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950"></select>
<input id="sFrom" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<input id="sTo" type="date" class="rounded-xl border px-3 py-2 bg-white dark:bg-slate-950" />
<button id="runSupplierStmt" class="rounded-xl border font-extrabold px-4 py-2">عرض كشف المورد</button>
</div>
<div id="supplierStmtHost"></div>
</section>
</div>
<script src="/static/app.js?v=14"></script>
<script>
(async function(){await initAuthUI();function esc(s){return String(s==null?"":s);}function money(n){return Number(n||0).toFixed(2);}
async function loadSettings(){const d=await apiGet("/api/cashierko/settings");const s=d.settings||{};document.getElementById("shopName").value=s.shop_name||"";document.getElementById("shopPhone").value=s.phone||"";document.getElementById("shopAddress").value=s.address||"";document.getElementById("currency").value=s.currency||"SAR";document.getElementById("taxRate").value=s.tax_rate||0;document.getElementById("invoicePrefix").value=s.invoice_prefix||"INV";document.getElementById("printSize").value=s.print_size||"A4";document.getElementById("thermalHeader").value=s.thermal_header||"";}
async function loadParties(){const c=await apiGet("/api/cashierko/customers");const s=await apiGet("/api/cashierko/suppliers");document.getElementById("customerSel").innerHTML=(c.items||[]).map(x=>`<option value="${esc(x.id)}">${esc(x.name)}</option>`).join("");document.getElementById("supplierSel").innerHTML=(s.items||[]).map(x=>`<option value="${esc(x.id)}">${esc(x.name)}</option>`).join("");}
function renderStatement(hostId, title, opening, closing, items){document.getElementById(hostId).innerHTML=`<div class="mb-2">${title} | رصيد أول: <b>${money(opening)}</b> | رصيد آخر: <b>${money(closing)}</b></div>${items&&items.length?`<div class="rounded-lg border overflow-auto"><table class="w-full text-sm"><thead class="bg-slate-100 dark:bg-slate-800"><tr><th class="px-2 py-2">التاريخ</th><th class="px-2 py-2">الفاتورة</th><th class="px-2 py-2">البيان</th><th class="px-2 py-2">مدين</th><th class="px-2 py-2">دائن</th><th class="px-2 py-2">الأثر</th></tr></thead><tbody>${items.map(x=>`<tr class="border-t"><td class="px-2 py-2">${esc(x.date)}</td><td class="px-2 py-2">${esc(x.invoice_no)}</td><td class="px-2 py-2">${esc(x.description)}</td><td class="px-2 py-2">${money(x.debit)}</td><td class="px-2 py-2">${money(x.credit)}</td><td class="px-2 py-2">${money(x.balance_delta)}</td></tr>`).join("")}</tbody></table></div>`:`<div class="opacity-70">لا يوجد حركات</div>`}`;}
document.getElementById("saveSettingsBtn").addEventListener("click",async()=>{try{await apiPatchJson("/api/cashierko/settings",{shop_name:document.getElementById("shopName").value||"",phone:document.getElementById("shopPhone").value||"",address:document.getElementById("shopAddress").value||"",currency:document.getElementById("currency").value||"SAR",tax_rate:Number(document.getElementById("taxRate").value||0),invoice_prefix:document.getElementById("invoicePrefix").value||"INV",print_size:document.getElementById("printSize").value||"A4",thermal_header:document.getElementById("thermalHeader").value||""});showToast("تم حفظ الإعدادات ✔️","#10b981");}catch(e){showToast(e.message||"فشل حفظ الإعدادات","#ef4444");}});
document.getElementById("runCustomerStmt").addEventListener("click",async()=>{try{const id=document.getElementById("customerSel").value||"";const f=document.getElementById("cFrom").value||"";const t=document.getElementById("cTo").value||"";const d=await apiGet(`/api/cashierko/customers/${encodeURIComponent(id)}/statement?date_from=${encodeURIComponent(f)}&date_to=${encodeURIComponent(t)}`);renderStatement("customerStmtHost",`كشف العميل: ${d.customer.name}`,d.opening_balance,d.closing_balance,d.items||[]);}catch(e){showToast(e.message||"فشل كشف العميل","#ef4444");}});
document.getElementById("runSupplierStmt").addEventListener("click",async()=>{try{const id=document.getElementById("supplierSel").value||"";const f=document.getElementById("sFrom").value||"";const t=document.getElementById("sTo").value||"";const d=await apiGet(`/api/cashierko/suppliers/${encodeURIComponent(id)}/statement?date_from=${encodeURIComponent(f)}&date_to=${encodeURIComponent(t)}`);renderStatement("supplierStmtHost",`كشف المورد: ${d.supplier.name}`,d.opening_balance,d.closing_balance,d.items||[]);}catch(e){showToast(e.message||"فشل كشف المورد","#ef4444");}});
const now=new Date().toISOString().slice(0,10);document.getElementById("cTo").value=now;document.getElementById("sTo").value=now;document.getElementById("cFrom").value=`${new Date().getFullYear()}-01-01`;document.getElementById("sFrom").value=`${new Date().getFullYear()}-01-01`;
await Promise.all([loadSettings(),loadParties()]);})();
</script>
</body></html>
