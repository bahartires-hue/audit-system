<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("auditflow-theme");
          var d = t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", d);
        } catch (e) {}
      })();
    </script>
    <title>التقارير - AuditFlow</title>
    <link rel="icon" href="/static/favicon.svg?v=5" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/tailwind.css?v=5" />
    <link rel="stylesheet" href="/static/dark.css?v=5" />
    <style>
      body { font-family: "IBM Plex Sans Arabic", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="toast" class="hidden toast-host text-white px-4 py-3 rounded-xl font-extrabold text-sm"></div>

    <header class="sticky top-0 z-40 border-b border-slate-200 dark:border-slate-700 bg-white/90 dark:bg-slate-900/90 backdrop-blur">
      <div class="max-w-6xl mx-auto px-4 py-3">
        <div class="flex items-center justify-between gap-3">
          <a href="/" class="app-brand" aria-label="AuditFlow الرئيسية">
            <span class="app-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 16l5 5 11-11" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span class="app-brand__text">AuditFlow</span>
          </a>
          <nav class="nav-desktop-only" aria-label="التنقل الرئيسي">
            <a href="/" data-nav="home">لوحة التحكم</a>
            <a href="/analyze" data-nav="analyze">تحليل</a>
            <a href="/reports" data-nav="reports">التقارير</a>
            <a href="/settings" data-nav="settings">الإعدادات</a>
          </nav>
          <div class="flex items-center gap-2 shrink-0">
            <div id="authArea"></div>
            <button type="button" id="themeToggle" class="theme-toggle-btn" title="الوضع الليلي/النهاري"></button>
            <button
              type="button"
              id="navMenuBtn"
              class="nav-toggle-btn nav-burger-only"
              aria-controls="mobileNavDrawer"
              aria-expanded="false"
              aria-label="فتح القائمة"
            >
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>
        <div id="mobileNavDrawer" class="mobile-nav-drawer" role="navigation" aria-label="قائمة الجوال">
          <a href="/" data-nav="home">لوحة التحكم</a>
          <a href="/analyze" data-nav="analyze">تحليل</a>
          <a href="/reports" data-nav="reports">التقارير</a>
          <a href="/settings" data-nav="settings">الإعدادات</a>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 md:p-8 shadow-sm">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <h1 class="text-2xl font-extrabold text-slate-900 dark:text-slate-50">التقارير</h1>
          <a href="/analyze" class="inline-flex items-center gap-2 px-4 py-2 rounded-2xl audit-cta-link font-extrabold shadow-sm transition-colors">
            <span aria-hidden="true">＋</span> تحليل جديد
          </a>
        </div>

        <div id="reportsHost" class="mt-6 grid gap-4 md:grid-cols-2"></div>
      </div>
    </main>

    <script src="/static/app.js?v=5"></script>
    <script>
      initAuthUI();
      loadReports().catch((e) => {
        console.error(e);
        showToast("فشل تحميل التقارير", "#ef4444");
      });
    </script>
  </body>
</html>
