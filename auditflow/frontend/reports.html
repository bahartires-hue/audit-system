<!doctype html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("auditflow-theme");
          var d = t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", d);
        } catch (e) {}
      })();
    </script>

      body { font-family: "IBM Plex Sans Arabic", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />

          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />

            <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.546-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />

    <div class="erp-content min-h-0">
      <header class="erp-topbar">
        <button type="button" id="navMenuBtn" class="nav-toggle-btn nav-burger-only" aria-controls="mobileNavDrawer" aria-expanded="false" aria-label="فتح القائمة">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" />
          </svg>
        </button>
        <div class="min-w-0 flex flex-col">
          <span class="erp-topbar__title truncate">التقارير</span>
          <span class="text-[0.65rem] font-extrabold text-slate-500 dark:text-slate-400 truncate">التطابق الأمثل <span class="opacity-50">|</span> <span dir="ltr">OptimalMatch</span></span>
        </div>
        <div class="erp-search hidden sm:block">
          <input type="search" id="erpSearchInp" placeholder="تصفية البطاقات الظاهرة…" autocomplete="off" />
        </div>
        <div class="flex items-center gap-2 shrink-0 ms-auto">
          <div id="authArea"></div>
          <button type="button" id="themeToggle" class="theme-toggle-btn" title="الوضع الليلي/النهاري"></button>
        </div>
      </header>
      <div id="mobileNavDrawer" class="mobile-nav-drawer md:hidden" role="navigation" aria-label="قائمة الجوال">
        <a href="/" data-nav="home">لوحة التحكم</a>
        <a href="/analyze" data-nav="analyze">تحليل</a>
        <a href="/convert" data-nav="convert">PDF إلى Excel</a>
        <a href="/reports" data-nav="reports">التقارير</a>
        <a href="/settings" data-nav="settings">الإعدادات</a>
        <a href="/help" data-nav="help">مساعدة</a>
      </div>

      <main class="erp-main">
        <div class="max-w-6xl mx-auto w-full px-4 py-6 md:px-6">
      <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 md:p-8 shadow-sm">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <h1 class="text-2xl font-extrabold text-slate-900 dark:text-slate-50">التقارير</h1>
          <a href="/analyze" class="inline-flex items-center gap-2 px-4 py-2 rounded-2xl audit-cta-link font-extrabold shadow-sm transition-colors">
            <span aria-hidden="true">＋</span> تحليل جديد
          </a>
        </div>

        <div class="mt-4 flex flex-col sm:flex-row flex-wrap gap-3 items-stretch sm:items-center">
          <label class="text-sm font-extrabold text-slate-600 dark:text-slate-300 shrink-0">العرض</label>
          <select
            id="reportsArchivedFilter"
            class="rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2 text-sm font-extrabold text-slate-900 dark:text-slate-100 min-w-[10rem]"
          >
            <option value="0">نشطة فقط</option>
            <option value="1">أرشيف فقط</option>
            <option value="all">الكل</option>
          </select>
          <input
            id="reportsSearchInp"
            type="search"
            placeholder="بحث: عنوان، فرع، وسم…"
            class="flex-1 min-w-[12rem] rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-950 px-3 py-2 text-sm outline-none text-slate-900 dark:text-slate-100"
          />
          <button
            type="button"
            id="reportsFilterBtn"
            class="px-4 py-2 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-extrabold hover:bg-slate-800 dark:hover:bg-slate-200"
          >
            تطبيق
          </button>
        </div>

        <div id="reportsHost" class="mt-6 grid gap-4 md:grid-cols-2"></div>
      </div>
        </div>
      </main>
    </div>

    <script src="/static/app.js?v=14"></script>
    <script>
      initAuthUI();
      initReportsFilters();
      loadReports().catch((e) => {
        console.error(e);
        showToast("فشل تحميل التقارير", "#ef4444");
      });
      (function () {
        const inp = document.getElementById("erpSearchInp");
        const host = document.getElementById("reportsHost");
        if (!inp || !host) return;
        inp.addEventListener("input", function () {
          const q = (inp.value || "").toLowerCase().trim();
          host.querySelectorAll(":scope > div").forEach((row) => {
            const t = (row.innerText || "").toLowerCase();
            row.style.display = !q || t.includes(q) ? "" : "none";
          });
        });
      })();
    </script>
  </body>
</html>
